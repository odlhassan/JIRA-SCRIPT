<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RMI Dashboard</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
    <script>
        (function () {
            const storageKey = 'rmi-dashboard-theme';
            const stored = localStorage.getItem(storageKey);
            const theme = (stored === 'dark' || stored === 'light') ? stored : 'light';
            document.documentElement.setAttribute('data-theme', theme);
        })();
    </script>
    <style>
        :root { color-scheme: light; }
        html[data-theme="dark"] { color-scheme: dark; }
        * { box-sizing: border-box; }
        html, body { margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f7fb; color: #1f2937; }
        .container { width: 100%; padding: 0; }
        .top-date-range-wrap { position: sticky; top: 0; z-index: 80; display: flex; justify-content: center; padding: .35rem .65rem 0; pointer-events: none; }
        .top-date-range-chip { pointer-events: auto; display: inline-flex; align-items: center; gap: .42rem; flex-wrap: wrap; padding: .3rem .52rem; border-radius: 999px; border: 1px solid #7a4b24; background: #8b5e34; box-shadow: 0 6px 16px rgba(17, 24, 39, .14); }
        .date-chip-segment { display: inline-flex; align-items: center; gap: .26rem; color: #fff7ed; font-size: .68rem; font-weight: 700; line-height: 1; }
        .date-chip-segment .material-icons-outlined { font-size: .85rem; }
        .date-chip-input { border: 1px solid #f3e8d8; border-radius: 999px; padding: .15rem .42rem; background: #fff7ed; color: #7c2d12; font-size: .67rem; font-weight: 700; min-height: 1.45rem; }
        .date-chip-input:focus { outline: none; border-color: #fcd7aa; box-shadow: 0 0 0 2px rgba(255, 237, 213, .38); }
        .date-chip-reset { display: inline-flex; align-items: center; gap: .2rem; border: 1px solid #f3e8d8; border-radius: 999px; background: #fff7ed; color: #7c2d12; font-size: .66rem; font-weight: 700; padding: .16rem .42rem; cursor: pointer; line-height: 1; }
        .date-chip-reset .material-icons-outlined { font-size: .78rem; }
        .date-chip-reset:hover { background: #ffedd5; }
        .date-chip-reset:focus { outline: none; border-color: #fcd7aa; box-shadow: 0 0 0 2px rgba(255, 237, 213, .38); }
        .header { position: sticky; top: 0; z-index: 50; background: #fff; border: 0; border-bottom: 1px solid #e5e7eb; border-radius: 0; padding: 1rem 1.25rem; margin-bottom: 1rem; }
        .header-toolbar { display: flex; align-items: center; justify-content: space-between; gap: .6rem; margin-bottom: .75rem; }
        .header-toolbar-left { display: flex; align-items: center; gap: .5rem; flex-wrap: wrap; }
        .header-toolbar-right { display: flex; align-items: center; gap: .5rem; }
        .header-link-btn { display: inline-flex; align-items: center; border: 1px solid #bfdbfe; border-radius: 999px; background: #eff6ff; color: #1d4ed8; font-size: .78rem; font-weight: 700; padding: .28rem .62rem; text-decoration: none; }
        .header-link-btn:hover { background: #dbeafe; border-color: #93c5fd; }
        .header-toggle { border: 1px solid #d1d5db; border-radius: 999px; background: #fff; color: #374151; font-size: .78rem; font-weight: 700; padding: .28rem .62rem; cursor: pointer; }
        .header-toggle:hover { background: #f8fafc; }
        .header-toggle .material-icons-outlined { font-size: .92rem; vertical-align: -2px; margin-right: .2rem; }
        #theme-toggle { background: rgba(191, 219, 254, .45); border-color: #93c5fd; color: #1e3a8a; }
        #theme-toggle .material-icons-outlined { color: #1d4ed8; }
        #theme-toggle:hover { background: rgba(191, 219, 254, .62); }
        html[data-theme="dark"] #theme-toggle { background: rgba(254, 243, 199, .45); border-color: #fcd34d; color: #fff; }
        html[data-theme="dark"] #theme-toggle .material-icons-outlined { color: #facc15; }
        html[data-theme="dark"] #theme-toggle:hover { background: rgba(254, 243, 199, .62); }
        .header.collapsed .header-toolbar { margin-bottom: 0; }
        .header.collapsed .header-grid { display: none; }
        .header-grid { display: grid; grid-template-columns: 30% 70%; gap: 1rem; align-items: start; }
        @media (max-width: 1200px) { .header-grid { grid-template-columns: 1fr; } }
        .meta { color: #6b7280; font-size: 0.9rem; margin-top: 0.4rem; }
        .subtitle { color: #4b5563; font-size: 0.9rem; margin-top: 0.25rem; }
        .filters { margin-top: 0.9rem; display: flex; flex-wrap: wrap; gap: 0.75rem; align-items: center; }
        .search-wrap { margin-top: 0.75rem; }
        .search-input { width: 100%; max-width: 420px; border: 1px solid #d1d5db; border-radius: 8px; padding: 0.5rem 0.65rem; font-size: 0.9rem; color: #111827; background: #fff; }
        .search-input:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 2px rgba(59,130,246,.15); }
        .project-chip { display: inline-flex; align-items: center; gap: .4rem; padding: .3rem .55rem; border: 1px solid #d1d5db; border-radius: 999px; background: #fff; font-size: .85rem; }

        .dashboard-layout { display: grid; grid-template-columns: 50% 25% 25%; gap: 1rem; align-items: start; padding: 0 1.25rem 1.25rem; }
        @media (max-width: 1200px) { .dashboard-layout { grid-template-columns: 1fr 1fr; } .lane-subtasks { grid-column: 1 / -1; } }
        @media (max-width: 900px) { .dashboard-layout { grid-template-columns: 1fr; } .lane-subtasks { grid-column: auto; } }

        .lane { background: #fff; border: 1px solid #e5e7eb; border-radius: 10px; padding: .85rem; }
        .lane-epics { background: #f3e8ff; border-color: #d8b4fe; }
        .lane-stories { background: #dbeafe; border-color: #93c5fd; }
        .lane-subtasks { background: #dcfce7; border-color: #86efac; }
        .lane-header { display: flex; align-items: center; justify-content: space-between; gap: .65rem; margin: 0 0 .7rem 0; flex-wrap: wrap; }
        .lane h2 { margin: 0; font-size: 1rem; color: #111827; }
        .cards { display: grid; gap: .8rem; }
        .orphan-block { margin-top: .85rem; border-top: 1px dashed #e5e7eb; padding-top: .7rem; }
        .orphan-title { margin: 0 0 .6rem 0; font-size: .85rem; color: #475569; }
        .lane-section { margin-top: .75rem; }
        .lane-section:first-child { margin-top: 0; }
        .lane-section-title { margin: 0 0 .55rem 0; font-size: .85rem; color: #475569; }
        .lane-selection-context { margin: 0 0 .65rem 0; font-size: .78rem; font-weight: 700; color: #1e40af; min-height: 1.1rem; }
        .lane-filter-group { display: flex; align-items: center; gap: .45rem; flex-wrap: wrap; }
        .lane-assignee-filter { position: relative; display: inline-flex; align-items: center; gap: .35rem; padding: .24rem 1.6rem .24rem .55rem; border: 1px solid #d1d5db; border-radius: 999px; background: #f8fafc; }
        .lane-assignee-filter::after { content: '▾'; position: absolute; right: .55rem; color: #64748b; font-size: .72rem; pointer-events: none; }
        .lane-assignee-filter-label { font-size: .73rem; font-weight: 700; color: #475569; white-space: nowrap; }
        .lane-assignee-select { appearance: none; -webkit-appearance: none; -moz-appearance: none; border: 0; background: transparent; color: #0f172a; font-size: .78rem; font-weight: 700; padding: 0; padding-right: .15rem; max-width: 150px; cursor: pointer; }
        .lane-assignee-select:focus { outline: none; }
        .lane-assignee-filter:focus-within { border-color: #60a5fa; box-shadow: 0 0 0 2px rgba(59,130,246,.14); }
        .status-chip-dropdown { position: relative; display: inline-flex; }
        .status-chip-trigger { display: inline-flex; align-items: center; gap: .35rem; border: 1px solid #d1d5db; border-radius: 999px; background: #ffffff; color: #1f2937; font-size: .74rem; font-weight: 700; line-height: 1; padding: .35rem .52rem; cursor: pointer; }
        .status-chip-trigger:hover { background: #f8fafc; border-color: #93c5fd; }
        .status-chip-trigger:focus { outline: none; border-color: #60a5fa; box-shadow: 0 0 0 2px rgba(59,130,246,.14); }
        .status-chip-trigger .chip-label { color: #475569; }
        .status-chip-trigger .chip-value { color: #0f172a; }
        .status-chip-trigger .chip-caret { color: #64748b; font-size: .72rem; }
        .status-chip-dropdown.open .status-chip-trigger { border-color: #60a5fa; box-shadow: 0 0 0 2px rgba(59,130,246,.14); }
        .status-chip-menu { position: absolute; top: calc(100% + .3rem); right: 0; min-width: 210px; max-height: 260px; overflow: auto; border: 1px solid #d1d5db; border-radius: 12px; background: #fff; box-shadow: 0 12px 26px rgba(15, 23, 42, .16); padding: .32rem; z-index: 60; opacity: 0; transform: scale(.98); transform-origin: top right; transition: opacity .16s ease, transform .16s ease; pointer-events: none; }
        .status-chip-dropdown.open .status-chip-menu { opacity: 1; transform: scale(1); pointer-events: auto; }
        .status-chip-option { width: 100%; text-align: left; display: flex; align-items: center; justify-content: space-between; gap: .4rem; border: 0; border-radius: 8px; background: transparent; color: #1f2937; font-size: .78rem; font-weight: 700; padding: .42rem .52rem; cursor: pointer; }
        .status-chip-option:hover { background: #eff6ff; color: #1d4ed8; }
        .status-chip-option:focus { outline: none; background: #dbeafe; color: #1d4ed8; }
        .status-chip-option.selected { background: #eff6ff; color: #1d4ed8; }
        .status-chip-option.selected::after { content: '✓'; font-size: .76rem; font-weight: 800; }
        .risk-chip-dropdown { position: relative; display: inline-flex; }
        .risk-chip-trigger { display: inline-flex; align-items: center; gap: .35rem; border: 1px solid #fdba74; border-radius: 999px; background: #fff7ed; color: #9a3412; font-size: .74rem; font-weight: 700; line-height: 1; padding: .35rem .52rem; cursor: pointer; }
        .risk-chip-trigger:hover { background: #ffedd5; border-color: #fb923c; }
        .risk-chip-trigger:focus { outline: none; border-color: #f97316; box-shadow: 0 0 0 2px rgba(249,115,22,.16); }
        .risk-chip-trigger .chip-label { color: #9a3412; }
        .risk-chip-trigger .chip-value { color: #7c2d12; }
        .risk-chip-trigger .chip-caret { color: #c2410c; font-size: .72rem; }
        .risk-chip-dropdown.open .risk-chip-trigger { border-color: #f97316; box-shadow: 0 0 0 2px rgba(249,115,22,.16); }
        .risk-chip-menu { position: absolute; top: calc(100% + .3rem); right: 0; min-width: 190px; max-height: 260px; overflow: auto; border: 1px solid #fdba74; border-radius: 12px; background: #fff7ed; box-shadow: 0 12px 26px rgba(124, 45, 18, .18); padding: .32rem; z-index: 60; opacity: 0; transform: scale(.98); transform-origin: top right; transition: opacity .16s ease, transform .16s ease; pointer-events: none; }
        .risk-chip-dropdown.open .risk-chip-menu { opacity: 1; transform: scale(1); pointer-events: auto; }
        .risk-chip-option { width: 100%; text-align: left; display: flex; align-items: center; justify-content: space-between; gap: .4rem; border: 0; border-radius: 8px; background: transparent; color: #9a3412; font-size: .78rem; font-weight: 700; padding: .42rem .52rem; cursor: pointer; }
        .risk-chip-option:hover { background: #fed7aa; color: #7c2d12; }
        .risk-chip-option:focus { outline: none; background: #fdba74; color: #7c2d12; }
        .risk-chip-option.selected { background: #fed7aa; color: #7c2d12; }
        .risk-chip-option.selected::after { content: '✓'; font-size: .76rem; font-weight: 800; }

        .card { border: 1px solid #e5e7eb; border-radius: 8px; padding: .8rem; background: #fafafa; transition: border-color .2s ease, box-shadow .2s ease; }
        .card-selectable { cursor: pointer; }
        .card-selectable:hover { border-color: #93c5fd; }
        .card-selected { position: sticky; top: 57px; border: 1.75px solid #2563eb; box-shadow: 0 0 0 2px rgba(37,99,235,.12); }
        .card-status-todo { background: #f9fafb; border-color: #d1d5db; }
        .card-status-on-hold { background: #fff7ed; border-color: #fdba74; }
        .card-status-in-progress { background: #eff6ff; border-color: #93c5fd; }
        .card-status-resolved { background: #f0fdf4; border-color: #86efac; }
        .card-status-at-risk { background: #fef2f2; border-color: #fca5a5; }
        .card-header { display: grid; grid-template-columns: minmax(0, 1fr) auto; gap: .6rem; align-items: start; }
        .card-type { margin-bottom: .25rem; font-size: .72rem; font-weight: 700; color: #475569; text-transform: uppercase; letter-spacing: .04em; }
        .card-title-row { display: flex; align-items: center; gap: .5rem; flex-wrap: wrap; }
        .card-title { margin: 0; font-size: .95rem; font-weight: 700; color: #0f172a; }
        .card-count-chip { display: inline-flex; align-items: center; padding: .2rem .45rem; border-radius: 999px; font-size: .7rem; font-weight: 700; line-height: 1; white-space: nowrap; border: 1px solid #cbd5e1; background: #f8fafc; color: #334155; }
        .card-count-chip.epic { border-color: #93c5fd; background: #eff6ff; color: #1d4ed8; }
        .card-count-chip.story { border-color: #a7f3d0; background: #ecfdf5; color: #047857; }
        .card-actions { display: flex; align-items: flex-start; justify-content: flex-end; gap: .4rem; }
        .card-copy-btn { display: inline-flex; align-items: center; justify-content: center; width: 1.9rem; height: 1.9rem; border-radius: 6px; border: 1px solid #cbd5e1; background: #fff; color: #334155; font-size: .88rem; cursor: pointer; }
        .card-copy-btn:hover { background: #f1f5f9; border-color: #93c5fd; color: #1d4ed8; }
        .card-copy-btn.copied { border-color: #86efac; background: #ecfdf5; color: #166534; }
        .card-link-label { display: inline-flex; align-items: center; padding: .3rem .5rem; border-radius: 6px; border: 1px solid #bfdbfe; background: #eff6ff; font-size: .72rem; letter-spacing: .02em; font-weight: 700; color: #1d4ed8; text-decoration: none; white-space: nowrap; }
        .card-link-label:hover { background: #dbeafe; border-color: #93c5fd; }
        .meta-lines { margin-top: .65rem; display: grid; gap: .5rem; font-size: .82rem; color: #374151; }
        .meta-line strong { color: #111827; }
        .assignee-chip { display: inline-flex; align-items: center; padding: .2rem .45rem; border-radius: 999px; border: 1px solid #bfdbfe; background: #eff6ff; color: #1d4ed8; font-size: .72rem; font-weight: 700; line-height: 1; }
        .assignee-chip.missing { border-color: #fecaca; background: #fef2f2; color: #b91c1c; }
        .danger-chip { display: inline-flex; align-items: center; padding: .16rem .42rem; border-radius: 999px; border: 1px solid #fecaca; background: #fef2f2; color: #b91c1c; font-size: .7rem; font-weight: 700; line-height: 1; }
        .dates-table { width: 100%; border-collapse: collapse; font-size: .78rem; color: #374151; }
        .dates-table th, .dates-table td { border: 1px solid #e5e7eb; padding: .25rem .35rem; text-align: left; vertical-align: top; }
        .dates-table th { background: #f8fafc; font-weight: 700; color: #111827; }
        .dates-table td:first-child { font-weight: 700; color: #111827; width: 24%; }
        .dates-table tr.ipp-date-mismatch td { color: #b91c1c; font-weight: 700; }
        .dates-table td.mismatch-planner { color: #b91c1c; font-weight: 700; }
        .dates-table td.mismatch-planned { color: #ffffff; background: #dc2626; font-weight: 700; }
        .badge-row { margin-top: .65rem; display: flex; flex-wrap: wrap; gap: .45rem; }
        .badge { display: inline-block; padding: .2rem .45rem; border-radius: 999px; font-size: .72rem; font-weight: 600; line-height: 1; }
        .yes { background: #dcfce7; color: #166534; }
        .no { background: #e5e7eb; color: #374151; }
        .sync-ok { background: #dcfce7; color: #166534; }
        .sync-bad { background: #fee2e2; color: #991b1b; }
        .risk-low { background: #dcfce7; color: #166534; }
        .risk-can-be { background: #fef9c3; color: #854d0e; }
        .risk-medium { background: #ffedd5; color: #9a3412; }
        .risk-high { background: #fee2e2; color: #991b1b; }
        .badge-tip-wrap { position: relative; display: inline-flex; align-items: center; }
        .badge-tip {
            position: absolute;
            bottom: calc(100% + 8px);
            left: 50%;
            transform: translateX(-50%);
            min-width: 220px;
            max-width: 300px;
            padding: .45rem .55rem;
            border: 1px solid #fca5a5;
            border-radius: 8px;
            background: #fff;
            color: #7f1d1d;
            font-size: .71rem;
            line-height: 1.35;
            font-weight: 600;
            box-shadow: 0 8px 20px rgba(15, 23, 42, .18);
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
            transition: opacity .14s ease;
            z-index: 40;
        }
        .badge-tip::after {
            content: "";
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%);
            border-width: 6px;
            border-style: solid;
            border-color: #fca5a5 transparent transparent transparent;
        }
        .badge-tip-wrap:hover .badge-tip,
        .badge-tip-wrap:focus-within .badge-tip {
            opacity: 1;
            visibility: visible;
        }
        .alert { margin-top: .6rem; border: 1px solid #fecaca; background: #fef2f2; color: #991b1b; border-radius: 6px; padding: .45rem .55rem; font-size: .78rem; font-weight: 600; }
        .mismatch-alert { display: flex; align-items: center; justify-content: space-between; gap: .45rem; }
        .mismatch-planner-btn { display: inline-flex; align-items: center; justify-content: center; width: 1.7rem; height: 1.7rem; border-radius: 999px; border: 1px solid #fca5a5; background: #fff; color: #991b1b; text-decoration: none; flex: 0 0 auto; }
        .mismatch-planner-btn:hover { background: #fee2e2; border-color: #ef4444; }
        .mismatch-planner-btn .material-icons-outlined { font-size: 1rem; }
        .info-note { margin-top: .45rem; border: 1px solid #86efac; background: #ecfdf5; color: #166534; border-radius: 6px; padding: .45rem .55rem; font-size: .78rem; font-weight: 600; display: flex; align-items: flex-start; gap: .38rem; }
        .info-note .material-icons-outlined { font-size: .95rem; line-height: 1; margin-top: .05rem; }
        .empty { color: #6b7280; font-size: .9rem; font-style: italic; }

        .gantt-panel-header h3 { margin: 0; font-size: 1rem; color: #0f172a; }
        .gantt-panel-subtitle { margin: .3rem 0 .55rem 0; font-size: .8rem; color: #475569; }
        .gantt-legend { margin-top: .4rem; display: flex; flex-wrap: wrap; gap: .45rem; font-size: .72rem; color: #334155; }
        .legend-pill { display: inline-flex; align-items: center; gap: .32rem; padding: .2rem .4rem; border-radius: 999px; background: #f8fafc; border: 1px solid #e2e8f0; }
        .legend-swatch { width: 10px; height: 10px; border-radius: 999px; }
        .legend-planned { background: #3b82f6; }
        .legend-missing { background: #fef2f2; border: 1px solid #fecaca; }
        .gantt-axis-row { margin-top: .55rem; display: grid; grid-template-columns: minmax(180px, 42%) minmax(0, 58%); align-items: center; gap: .5rem; }
        .gantt-axis-spacer { min-height: 1px; }
        .gantt-axis-track { position: relative; min-height: 28px; border: 1px solid #e2e8f0; border-radius: 8px; background: #fcfdff; overflow: visible; }
        .gantt-axis-tick { position: absolute; top: 0; bottom: 0; width: 0; pointer-events: none; }
        .gantt-axis-tick::before { content: ''; position: absolute; top: 12px; bottom: 4px; left: 0; width: 1px; background: #cbd5e1; }
        .gantt-axis-label { position: absolute; top: 1px; left: 0; transform: translateX(-50%); font-size: .66rem; color: #64748b; font-weight: 700; white-space: nowrap; line-height: 1; background: #fcfdff; padding: 0 .18rem; border-radius: 4px; }
        .gantt-axis-tick.start .gantt-axis-label { transform: translateX(0); }
        .gantt-axis-tick.end .gantt-axis-label { transform: translateX(-100%); }
        .gantt-grid { margin-top: .55rem; display: grid; gap: .35rem; max-height: 320px; overflow: auto; padding-right: .2rem; }
        .gantt-row { display: grid; grid-template-columns: minmax(180px, 42%) minmax(0, 58%); align-items: center; gap: .5rem; }
        .gantt-label-col { min-width: 0; font-size: .73rem; color: #1f2937; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .gantt-track-col { position: relative; min-height: 26px; border: 1px solid #e2e8f0; border-radius: 6px; background: #f8fafc; overflow: visible; }
        .gantt-bar { position: absolute; top: 3px; bottom: 3px; border-radius: 5px; background: linear-gradient(90deg, #2563eb 0%, #3b82f6 100%); color: #fff; display: flex; align-items: center; justify-content: center; padding: 0 .35rem; font-size: .67rem; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .gantt-bar-text { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .gantt-date-label { position: absolute; top: 50%; transform: translateY(-50%); font-size: .62rem; color: #334155; font-weight: 700; line-height: 1; white-space: nowrap; pointer-events: none; background: rgba(248, 250, 252, .95); padding: 0 .16rem; border-radius: 4px; }
        .gantt-date-start { transform: translate(calc(-100% - 6px), -50%); }
        .gantt-date-end { transform: translate(6px, -50%); }
        .gantt-bar-empty { display: inline-flex; align-items: center; padding: .18rem .38rem; border-radius: 999px; border: 1px solid #fecaca; background: #fef2f2; color: #b91c1c; font-size: .64rem; font-weight: 700; margin: 3px 0 0 6px; }
        .gantt-today-marker { position: absolute; top: 0; bottom: 0; width: 2px; background: #dc2626; opacity: .85; pointer-events: none; }

<script>
const dashboardData = __DASHBOARD_DATA__;
const allEpics = dashboardData.epics || [];
const allStories = dashboardData.stories || [];
const allSubtasks = dashboardData.subtasks || [];
const allBugSubtasks = dashboardData.bug_subtasks || [];
const allProjects = dashboardData.projects || [];
const orphans = dashboardData.orphans || { stories: [], subtasks: [], bug_subtasks: [] };
const selectedProjects = new Set(allProjects.includes('O2') ? ['O2'] : []);
const DEFAULT_DATE_FROM_MONTH = '2026-01';
const DEFAULT_DATE_TO_MONTH = '2026-02';
let selectedDateFromMonth = DEFAULT_DATE_FROM_MONTH;
let selectedDateToMonth = DEFAULT_DATE_TO_MONTH;
let searchQuery = '';
let selectedEpicKey = '';
let selectedStoryKey = '';
const ASSIGNEE_ALL = '__ALL__';
const ASSIGNEE_UNASSIGNED = '__UNASSIGNED__';
const STATUS_ALL = '__ALL__';
const RISK_ALL = '__ALL__';
let selectedEpicAssignee = ASSIGNEE_ALL;
let selectedStoryAssignee = ASSIGNEE_ALL;
let selectedSubtaskAssignee = ASSIGNEE_ALL;
let selectedEpicStatus = STATUS_ALL;
let selectedStoryStatus = STATUS_ALL;
let selectedSubtaskStatus = STATUS_ALL;
let selectedEpicRisk = RISK_ALL;
let selectedStoryRisk = RISK_ALL;
let selectedSubtaskRisk = RISK_ALL;
const themeToggleButton = document.getElementById('theme-toggle');
const headerContainer = document.getElementById('dashboard-header');
const headerToggleButton = document.getElementById('header-toggle');
const removeFiltersButton = document.getElementById('remove-filters-btn');
const THEME_STORAGE_KEY = 'rmi-dashboard-theme';
const HEADER_COLLAPSE_STORAGE_KEY = 'rmi-dashboard-header-collapsed';
document.getElementById('generated-at').textContent = dashboardData.generated_at || '-';

const asText = (v) => String(v || '').trim();
const asYesNo = (v) => asText(v).toLowerCase() === 'yes' ? 'Yes' : 'No';
const asKey = (item) => asText(item.issue_key || item.epic_key || item.epic_key_legacy);
const itemStatus = (item) => asText(item.status || item.epic_status);
const itemHours = (item) => { const n = Number(item.subtask_hours_logged_total || item.total_hours_logged || 0); return Number.isFinite(n) ? n : 0; };
const storyEpicKey = (story) => asText(story && (story.epic_key || story.parent_issue_key));
const subtaskStoryKey = (subtask) => asText(subtask && (subtask.story_key || subtask.parent_issue_key));
function normalizeAssignee(value) {
    const text = asText(value);
    return (!text || text.toLowerCase() === 'unassigned') ? ASSIGNEE_UNASSIGNED : text;
}
function assigneeLabel(value) {
    if (value === ASSIGNEE_ALL) return 'All';
    if (value === ASSIGNEE_UNASSIGNED) return 'Unassigned';
    return value;
}
function normalizeStatus(value) {
    const text = asText(value).toLowerCase();
    if (!text) return '';
    const compact = text.replace(/[^a-z0-9]+/g, ' ').trim();
    if (!compact) return '';
    if (compact.includes('at risk')) return 'at_risk';
    if (compact.includes('in progress')) return 'in_progress';
    if (compact === 'todo' || compact === 'to do' || compact.includes('to do')) return 'to_do';
    if (compact.includes('on hold')) return 'on_hold';
    if (compact.includes('resolved') || compact === 'done') return 'resolved';
    return compact.replace(/\s+/g, '_');
}
function statusLabel(value) {
    if (value === STATUS_ALL) return 'All Statuses';
    const labels = {
        at_risk: 'AT RISK',
        in_progress: 'In Progress',
        to_do: 'To Do',
        on_hold: 'On Hold',
        resolved: 'Resolved',
    };
    if (labels[value]) return labels[value];
    return asText(value)
        .split('_')
        .filter(Boolean)
        .map(part => part.charAt(0).toUpperCase() + part.slice(1))
        .join(' ');
}
function normalizeRisk(item) {
    const level = asText(item && item.risk_level).toLowerCase();
    if (level === 'low' || level === 'can_be' || level === 'medium' || level === 'high') return level;
    const score = Number(item && item.risk_score_final);
    const safeScore = Number.isFinite(score) ? Math.max(0, Math.round(score)) : 0;
    if (safeScore >= 4) return 'high';
    if (safeScore >= 2) return 'medium';
    if (safeScore === 1) return 'can_be';
    return 'low';
}
function riskLabel(value) {
    if (value === RISK_ALL) return 'All Risk';
    const labels = {
        high: 'Highly At Risk',
        medium: 'Medium Risk',
        can_be: 'Can Be',
        low: 'Low',
    };
    return labels[value] || 'Low';
}
function buildAssigneeOptions(items) {
    const set = new Set();
    items.forEach(item => {
        const normalized = normalizeAssignee(item.assignee);
        if (normalized !== ASSIGNEE_UNASSIGNED) set.add(normalized);
    });
    const named = Array.from(set).sort((a, b) => a.localeCompare(b, undefined, { sensitivity: 'base' }));
    return [ASSIGNEE_ALL, ...named, ASSIGNEE_UNASSIGNED];
}
function buildStatusOptions(items) {
    const values = new Set();
    items.forEach(item => {
        const normalized = normalizeStatus(itemStatus(item));
        if (normalized) values.add(normalized);
    });
    const sorted = Array.from(values).sort((a, b) => statusLabel(a).localeCompare(statusLabel(b), undefined, { sensitivity: 'base' }));
    return [STATUS_ALL, ...sorted];
}
function buildRiskOptions(items) {
    const values = new Set();
    items.forEach(item => {
        values.add(normalizeRisk(item));
    });
    const order = ['high', 'medium', 'can_be', 'low'];
    const sorted = order.filter(value => values.has(value));
    return [RISK_ALL, ...sorted];
}

function addDays(baseDate, delta) {
    return new Date(baseDate.getFullYear(), baseDate.getMonth(), baseDate.getDate() + delta);
}
function diffDaysInclusive(start, end) {
    const dayMs = 24 * 60 * 60 * 1000;
    const s = new Date(start.getFullYear(), start.getMonth(), start.getDate()).getTime();
    const e = new Date(end.getFullYear(), end.getMonth(), end.getDate()).getTime();
    return Math.max(1, Math.floor((e - s) / dayMs) + 1);
}
function getEpicStoriesForGantt(epicKey) {
    if (!epicKey) return [];
    return allStories
        .filter(story =>
            selectedProjects.has(asText(story.project_key)) &&
            matchesSearch(story) &&

}
function normalizeStoryPlannedDates(story) {
    const rawStart = parseDateValue(story && story.jira_start_date);
    const rawEnd = parseDateValue(story && story.jira_end_date);
    if (!rawStart && !rawEnd) return null;
    const start = rawStart || rawEnd;
    const end = rawEnd || rawStart;
    if (!start || !end) return null;
    return start.getTime() <= end.getTime()
        ? { start, end }
        : { start: end, end: start };
}
function getPlannedRangeForStories(stories) {
    const plannedRanges = stories
        .map(story => normalizeStoryPlannedDates(story))
        .filter(Boolean);
    if (!plannedRanges.length) return null;
    let minStart = plannedRanges[0].start;
    let maxEnd = plannedRanges[0].end;
    for (const range of plannedRanges) {
        if (range.start.getTime() < minStart.getTime()) minStart = range.start;
        if (range.end.getTime() > maxEnd.getTime()) maxEnd = range.end;
    }
    let paddedStart = minStart;
    let paddedEnd = addDays(maxEnd, 10);
    if (diffDaysInclusive(paddedStart, paddedEnd) < 2) {
        paddedEnd = addDays(paddedStart, 1);
    }
    return { start: paddedStart, end: paddedEnd };
}
function buildGanttRows(stories, range) {
    const totalSpanDays = range ? diffDaysInclusive(range.start, range.end) : 1;
    const rows = stories.map(story => {
        const storyRange = normalizeStoryPlannedDates(story);
        const key = asKey(story);
        const summary = asText(story.summary) || '-';
        const assignee = assigneeLabel(normalizeAssignee(story.assignee));
        const label = `${key}: ${summary}`;
        if (!storyRange || !range) {
            return {
                key,
                label,
                assignee,
                hasPlannedRange: false,
                sortTime: Number.MAX_SAFE_INTEGER,
            };
        }
        const offsetDays = diffDaysInclusive(range.start, storyRange.start) - 1;
        const widthDays = diffDaysInclusive(storyRange.start, storyRange.end);
        const leftPct = Math.max(0, Math.min(100, (offsetDays / totalSpanDays) * 100));
        const widthPct = Math.max(1.8, Math.min(100 - leftPct, (widthDays / totalSpanDays) * 100));
        return {
            key,
            label,
            assignee,
            hasPlannedRange: true,
            leftPct,
            widthPct,
            endPct: Math.max(0, Math.min(100, leftPct + widthPct)),
            sortTime: storyRange.start.getTime(),
            plannedStartText: formatDateDisplayFromDate(storyRange.start),
            plannedEndText: formatDateDisplayFromDate(storyRange.end),
            plannedStartShort: formatAxisDateLabel(storyRange.start),
            plannedEndShort: formatAxisDateLabel(storyRange.end),
        };
    });
    return rows.sort((a, b) => {
        if (a.hasPlannedRange && !b.hasPlannedRange) return -1;
        if (!a.hasPlannedRange && b.hasPlannedRange) return 1;
        if (a.sortTime !== b.sortTime) return a.sortTime - b.sortTime;
        return a.label.localeCompare(b.label, undefined, { sensitivity: 'base' });
    });
}
function formatAxisDateLabel(dateValue) {
    const monthNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    return `${monthNames[dateValue.getMonth()]} ${dateValue.getDate()}`;
}
function buildGanttAxisTicks(range) {
    if (!range) return [];
    const ticks = [];
    const totalSpanDays = diffDaysInclusive(range.start, range.end);
    const step = 7;
    for (let i = 0; i < totalSpanDays; i += step) {
        const tickDate = addDays(range.start, i);
        ticks.push({
            label: formatAxisDateLabel(tickDate),
            pct: Math.max(0, Math.min(100, (i / totalSpanDays) * 100)),
        });
    }
    const endLabel = formatAxisDateLabel(range.end);
    const hasEndTick = ticks.some(tick => tick.label === endLabel && Math.abs(tick.pct - 100) < 0.001);
    if (!hasEndTick) {
        ticks.push({
            label: endLabel,
            pct: 100,
        });
    }
    return ticks;
}
function getTodayMarkerPercent(range) {
    if (!range) return null;
    const today = new Date();
    const todayDate = new Date(today.getFullYear(), today.getMonth(), today.getDate());
    if (todayDate.getTime() < range.start.getTime() || todayDate.getTime() > range.end.getTime()) return null;
    const totalSpanDays = diffDaysInclusive(range.start, range.end);
    const offsetDays = diffDaysInclusive(range.start, todayDate) - 1;
    return Math.max(0, Math.min(100, (offsetDays / totalSpanDays) * 100));
}
function renderGantt(epic) {

            return `<span class="gantt-axis-tick${edgeClass}" style="left:${tick.pct}%;" aria-hidden="true"><span class="gantt-axis-label">${escapeHtml(tick.label)}</span></span>`;

        if (row.hasPlannedRange) {

            const barTitle = `${row.label}\nAssignee: ${row.assignee}\nPlanned: ${row.plannedStartText} - ${row.plannedEndText}`;

            html += `<div class="gantt-bar" style="left:${row.leftPct}%;width:${row.widthPct}%;" title="${escapeHtml(barTitle)}"><span class="gantt-bar-text">${escapeHtml(row.assignee)}</span></div>`;

        }
        html += '</div></div>';

    html += '</div>';
    host.innerHTML = html;
}

function renderList(hostId, items, kind, selectedKey, emptyText) {
    const host = document.getElementById(hostId);
    if (!items.length) { host.innerHTML = `<div class="empty">${escapeHtml(emptyText)}</div>`; return; }
    host.innerHTML = items.map(item => renderWorkItemCard(item, kind, asKey(item) === selectedKey)).join('');
}

function renderEpicsLane(epics, selectedKey) {
    const host = document.getElementById('epics-list');
    const ippMeetingEpics = epics.filter(item => asYesNo(item.latest_ipp_meeting || 'No') === 'Yes');
    const otherEpics = epics.filter(item => asYesNo(item.latest_ipp_meeting || 'No') !== 'Yes');
    const renderSection = (title, items, emptyText) => {
        const body = items.length
            ? `<div class="cards">${items.map(item => renderWorkItemCard(item, 'epic', asKey(item) === selectedKey)).join('')}</div>`
            : `<div class="empty">${escapeHtml(emptyText)}</div>`;
        return `<div class="lane-section"><h3 class="lane-section-title">${escapeHtml(title)} (${items.length})</h3>${body}</div>`;
    };
    host.innerHTML = [
        renderSection('IPP Meeting RMIs', ippMeetingEpics, 'No IPP Meeting RMIs for selected filters.'),
        renderSection('Other RMIs', otherEpics, 'No Other RMIs for selected filters.'),
    ].join('');
}

function renderAll() {
    const epicBase = allEpics.filter(e => selectedProjects.has(asText(e.project_key)) && matchesSearch(e) && matchesAssignee(e, selectedEpicAssignee) && matchesDateFilter(e));
    const visibleEpics = epicBase.filter(e => matchesStatus(e, selectedEpicStatus) && matchesRisk(e, selectedEpicRisk));
    if (!visibleEpics.length) {
        selectedEpicKey = '';
        selectedStoryKey = '';
    } else if (selectedEpicKey && !visibleEpics.some(e => asKey(e) === selectedEpicKey)) {
        selectedEpicKey = '';
        selectedStoryKey = '';
    }
    const selectedEpic = visibleEpics.find(e => asKey(e) === selectedEpicKey) || null;
    const selectedEpicScopeKey = selectedEpic ? asKey(selectedEpic) : '';

    const storyBase = allStories.filter(s => selectedProjects.has(asText(s.project_key)) && matchesSearch(s) && matchesAssignee(s, selectedStoryAssignee) && matchesDateFilter(s));
    const storiesInEpicScope = selectedEpicScopeKey
        ? storyBase.filter(s => storyEpicKey(s) === selectedEpicScopeKey)
        : storyBase;
    const visibleStories = storiesInEpicScope.filter(s => matchesStatus(s, selectedStoryStatus) && matchesRisk(s, selectedStoryRisk));
    if (!selectedStoryKey || !visibleStories.some(s => asKey(s) === selectedStoryKey)) selectedStoryKey = '';
    const selectedStory = selectedStoryKey
        ? (visibleStories.find(s => asKey(s) === selectedStoryKey) || null)
        : null;
    const selectedEpicStoryKeys = selectedEpicScopeKey
        ? new Set(storyBase.filter(s => storyEpicKey(s) === selectedEpicScopeKey).map(asKey))
        : new Set();

    const subtaskBase = allSubtasks.filter(t => selectedProjects.has(asText(t.project_key)) && matchesSearch(t) && matchesAssignee(t, selectedSubtaskAssignee) && matchesDateFilter(t));
    const bugSubtaskBase = allBugSubtasks.filter(t => selectedProjects.has(asText(t.project_key)) && matchesSearch(t) && matchesAssignee(t, selectedSubtaskAssignee) && matchesDateFilter(t));
    const subtasksInStoryScope = selectedStoryKey
        ? subtaskBase.filter(t => subtaskStoryKey(t) === selectedStoryKey)
        : (selectedEpicScopeKey
            ? subtaskBase.filter(t => selectedEpicStoryKeys.has(subtaskStoryKey(t)))
            : subtaskBase);
    const bugSubtasksInStoryScope = selectedStoryKey
        ? bugSubtaskBase.filter(t => subtaskStoryKey(t) === selectedStoryKey)
        : (selectedEpicScopeKey
            ? bugSubtaskBase.filter(t => selectedEpicStoryKeys.has(subtaskStoryKey(t)))
            : bugSubtaskBase);
    const visibleSubtasks = subtasksInStoryScope.filter(t => matchesStatus(t, selectedSubtaskStatus) && matchesRisk(t, selectedSubtaskRisk));
    const visibleBugSubtasks = bugSubtasksInStoryScope.filter(t => matchesStatus(t, selectedSubtaskStatus) && matchesRisk(t, selectedSubtaskRisk));

    const orphanStories = (orphans.stories || []).filter(s => selectedProjects.has(asText(s.project_key)) && matchesSearch(s) && matchesAssignee(s, selectedStoryAssignee) && matchesDateFilter(s) && matchesStatus(s, selectedStoryStatus) && matchesRisk(s, selectedStoryRisk));
    const orphanSubtasks = (orphans.subtasks || []).filter(t => selectedProjects.has(asText(t.project_key)) && matchesSearch(t) && matchesAssignee(t, selectedSubtaskAssignee) && matchesDateFilter(t) && matchesStatus(t, selectedSubtaskStatus) && matchesRisk(t, selectedSubtaskRisk));
    const orphanBugSubtasks = (orphans.bug_subtasks || []).filter(t => selectedProjects.has(asText(t.project_key)) && matchesSearch(t) && matchesAssignee(t, selectedSubtaskAssignee) && matchesDateFilter(t) && matchesStatus(t, selectedSubtaskStatus) && matchesRisk(t, selectedSubtaskRisk));

    document.getElementById('epics-title').textContent = `Epics (${visibleEpics.length})`;
    document.getElementById('stories-title').textContent = `Stories (${visibleStories.length})`;
    document.getElementById('subtasks-title').textContent = `Subtasks (${visibleSubtasks.length}) | Bug Subtasks (${visibleBugSubtasks.length})`;
    const storiesSelectionContext = document.getElementById('stories-selection-context');
    if (storiesSelectionContext) {
        storiesSelectionContext.textContent = selectedEpic
            ? `Selected Epic: ${asText(selectedEpic.summary) || asKey(selectedEpic) || '-'}`
            : '';
    }
    const subtasksSelectionContext = document.getElementById('subtasks-selection-context');
    if (subtasksSelectionContext) {
        subtasksSelectionContext.textContent = selectedStory
            ? `Selected Story: ${asText(selectedStory.summary) || asKey(selectedStory) || '-'}`
            : '';
    }

    renderEpicsLane(visibleEpics, selectedEpicKey);
    const storiesEmptyText = selectedEpicScopeKey
        ? 'No stories for selected epic and filters.'
        : 'No stories for selected filters.';
    const subtasksEmptyText = selectedStoryKey
        ? 'No subtasks for selected story and filters.'
        : (selectedEpicScopeKey ? 'No subtasks for selected epic and filters.' : 'No subtasks for selected filters.');
    const bugSubtasksEmptyText = selectedStoryKey
        ? 'No bug subtasks for selected story and filters.'
        : (selectedEpicScopeKey ? 'No bug subtasks for selected epic and filters.' : 'No bug subtasks for selected filters.');

    renderList('stories-list', visibleStories, 'story', selectedStoryKey, storiesEmptyText);
    renderList('subtasks-list', visibleSubtasks, 'subtask', '', subtasksEmptyText);
    renderList('bug-subtasks-list', visibleBugSubtasks, 'bug_subtask', '', bugSubtasksEmptyText);
    renderList('orphan-stories-list', orphanStories, 'story', '', 'No orphan stories.');
    renderList('orphan-subtasks-list', orphanSubtasks, 'subtask', '', 'No orphan subtasks.');
    renderList('orphan-bug-subtasks-list', orphanBugSubtasks, 'bug_subtask', '', 'No orphan bug subtasks.');
    renderStatusFilterControls();
    renderRiskFilterControls();
    renderAssigneeFilterSummary();
    renderGantt(selectedEpic);
    attachSelectionHandlers();
    attachCopyHandlers();
}

renderProjectFilters();
renderAssigneeFilterControls();
initializeStatusFilterDropdowns();
initializeRiskFilterDropdowns();
initializeThemeToggle();
initializeHeaderToggle();
const dateFilterFromInput = document.getElementById('date-filter-from');
const dateFilterToInput = document.getElementById('date-filter-to');
const dateFilterResetButton = document.getElementById('date-filter-reset');
if (dateFilterFromInput) dateFilterFromInput.value = selectedDateFromMonth;
if (dateFilterToInput) dateFilterToInput.value = selectedDateToMonth;
if (dateFilterFromInput) {
    dateFilterFromInput.addEventListener('change', () => {
        selectedDateFromMonth = dateFilterFromInput.value || DEFAULT_DATE_FROM_MONTH;
        normalizeDateMonths();
        renderAll();
    });
}
if (dateFilterToInput) {
    dateFilterToInput.addEventListener('change', () => {
        selectedDateToMonth = dateFilterToInput.value || DEFAULT_DATE_TO_MONTH;
        normalizeDateMonths();
        renderAll();
    });
}
if (dateFilterResetButton) {
    dateFilterResetButton.addEventListener('click', () => {
        selectedDateFromMonth = DEFAULT_DATE_FROM_MONTH;
        selectedDateToMonth = DEFAULT_DATE_TO_MONTH;
        normalizeDateMonths();
        renderAll();
    });
}
const searchInput = document.getElementById('workitem-search');
if (searchInput) {
    searchInput.addEventListener('input', () => {
        searchQuery = String(searchInput.value || '').trim().toLowerCase();
        renderAll();
    });
}
const epicAssigneeFilter = document.getElementById('epic-assignee-filter');
if (epicAssigneeFilter) {
    epicAssigneeFilter.addEventListener('change', () => {
        selectedEpicAssignee = epicAssigneeFilter.value || ASSIGNEE_ALL;
        renderAll();
    });
}
const storyAssigneeFilter = document.getElementById('story-assignee-filter');
if (storyAssigneeFilter) {
    storyAssigneeFilter.addEventListener('change', () => {
        selectedStoryAssignee = storyAssigneeFilter.value || ASSIGNEE_ALL;
        renderAll();
    });
}
const subtaskAssigneeFilter = document.getElementById('subtask-assignee-filter');
if (subtaskAssigneeFilter) {
    subtaskAssigneeFilter.addEventListener('change', () => {
        selectedSubtaskAssignee = subtaskAssigneeFilter.value || ASSIGNEE_ALL;
        renderAll();
    });
}
const assigneeSummaryHost = document.getElementById('assignee-filter-summary');
if (assigneeSummaryHost) {
    assigneeSummaryHost.addEventListener('click', (event) => {
        const target = event.target.closest('[data-clear-filter]');
        if (!target) return;
        const filterType = target.getAttribute('data-clear-filter');
        if (filterType === 'epic' || filterType === 'all') selectedEpicAssignee = ASSIGNEE_ALL;
        if (filterType === 'story' || filterType === 'all') selectedStoryAssignee = ASSIGNEE_ALL;
        if (filterType === 'subtask' || filterType === 'all') selectedSubtaskAssignee = ASSIGNEE_ALL;
        renderAssigneeFilterControls();
        renderAll();
    });
}
if (removeFiltersButton) {
    removeFiltersButton.addEventListener('click', () => {
        resetAllFilters();
    });
}
renderAll();
</script>
<script src="shared-nav.js"></script>
</body>
</html>
