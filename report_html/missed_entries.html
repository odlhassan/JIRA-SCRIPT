    const rows = reportData.rows || [];
    const fieldLabels = {
      jira_start_date: "Jira Planned Start Date",
      jira_due_date: "Jira Planned Due Date",
      original_estimate: "Original Estimates",
    };

    const generatedAtNode = document.getElementById("generated-at");
    const sourceFileNode = document.getElementById("source-file");
    const rowsLoadedNode = document.getElementById("rows-loaded");
    const refreshReportButton = document.getElementById("refresh-report");
    const exportExcelButton = document.getElementById("export-excel");

    const fieldCheckboxes = Array.from(document.querySelectorAll(".field-checkbox"));

    const DEFAULT_DATE_FROM_MONTH = reportData.default_date_from || "2026-01";
    const DEFAULT_DATE_TO_MONTH = reportData.default_date_to || "2026-02";
    let selectedDateFromMonth = DEFAULT_DATE_FROM_MONTH;
    let selectedDateToMonth = DEFAULT_DATE_TO_MONTH;

    generatedAtNode.textContent = reportData.generated_at || "-";
    sourceFileNode.textContent = reportData.source_file || "-";
    rowsLoadedNode.textContent = String(rows.length);

    function asText(value) {
      return String(value || "").trim();
    }

    function parseDateValue(value) {
      const text = asText(value);
      if (!text) return null;
      const m = text.match(/^(\d{4})-(\d{2})-(\d{2})$/);
      if (!m) return null;
      return new Date(Number(m[1]), Number(m[2]) - 1, Number(m[3]));
    }

    function parseMonthValue(value) {
      const text = asText(value);
      const m = text.match(/^(\d{4})-(\d{2})$/);
      if (!m) return null;
      const year = Number(m[1]);
      const monthIndex = Number(m[2]) - 1;
      if (!Number.isFinite(year) || !Number.isFinite(monthIndex) || monthIndex < 0 || monthIndex > 11) {
        return null;
      }
      return { year, monthIndex };
    }

    function monthStart(value) {
      const parsed = parseMonthValue(value);
      if (!parsed) return null;
      return new Date(parsed.year, parsed.monthIndex, 1);
    }

    function monthEnd(value) {
      const parsed = parseMonthValue(value);
      if (!parsed) return null;
      return new Date(parsed.year, parsed.monthIndex + 1, 0);
    }

    function normalizeMonths() {
      if (selectedDateFromMonth > selectedDateToMonth) {
        const temp = selectedDateFromMonth;
        selectedDateFromMonth = selectedDateToMonth;
        selectedDateToMonth = temp;
      }
      dateFromInput.value = selectedDateFromMonth;
      dateToInput.value = selectedDateToMonth;
    }

    function rangesOverlap(startA, endA, startB, endB) {
      if (!startA || !endA || !startB || !endB) return false;
      return startA.getTime() <= endB.getTime() && startB.getTime() <= endA.getTime();
    }

    function matchesDateRange(row) {
      const start = parseDateValue(row.jira_start_date);
      const due = parseDateValue(row.jira_due_date);
      if (!start && !due) {
        return false;
      }
      const rowStart = start || due;
      const rowEnd = due || start;
      const filterStart = monthStart(selectedDateFromMonth) || monthStart(DEFAULT_DATE_FROM_MONTH);
      const filterEnd = monthEnd(selectedDateToMonth) || monthEnd(DEFAULT_DATE_TO_MONTH);
      return rangesOverlap(filterStart, filterEnd, rowStart, rowEnd);
    }

    function isMissing(value) {
      return asText(value) === "";
    }

    function selectedFieldKeys() {
      return fieldCheckboxes.filter((node) => node.checked).map((node) => node.value);
    }

    function missingFields(row, fields) {
      const misses = [];
      for (const field of fields) {
        if (isMissing(row[field])) {
          misses.push(field);
        }
      }
      return misses;
    }

    function normalizeAssignee(value) {
      const text = asText(value);
      if (!text || text.toLowerCase() === "unassigned") {
        return "Unassigned";
      }
      return text;
    }

    function buildFilteredRows() {
      const selectedFields = selectedFieldKeys();
      if (!selectedFields.length) {
        return [];
      }
      const filtered = [];
      for (const row of rows) {
        if (!matchesDateRange(row)) {
          continue;
        }
        const misses = missingFields(row, selectedFields);
        if (!misses.length) {
          continue;
        }
        const item = Object.assign({}, row);
        item._misses = misses;
        filtered.push(item);
      }
      return filtered;
    }

    function renderSummary(items) {
      const byAssignee = new Map();
      for (const row of items) {
        const assignee = normalizeAssignee(row.assignee);
        if (!byAssignee.has(assignee)) {
          byAssignee.set(assignee, {
            assignee,
            total: 0,
            jira_start_date: 0,
            jira_due_date: 0,
            original_estimate: 0,
            rows: [],
          });
        }
        const entry = byAssignee.get(assignee);
        entry.total += 1;
        for (const field of row._misses || []) {
          entry[field] += 1;
        }
        entry.rows.push(row);
      }

      const rowsOut = Array.from(byAssignee.values()).sort((a, b) => {
        const byTotal = b.total - a.total;
        if (byTotal !== 0) return byTotal;
        return a.assignee.localeCompare(b.assignee);
      });

      summaryRowsNode.innerHTML = "";
      totalMissedCountNode.textContent = String(items.length);
      if (!rowsOut.length) {
        const tr = document.createElement("tr");
        const td = document.createElement("td");
        td.colSpan = 5;
        td.className = "empty";
        td.textContent = "No missed entries for current filters.";
        tr.appendChild(td);
        summaryRowsNode.appendChild(tr);
        return;
      }

      for (const entry of rowsOut) {
        const assigneeId = "assignee-" + entry.assignee.toLowerCase().replace(/[^a-z0-9]+/g, "-");
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td><button type="button" class="assignee-toggle" data-target="${assigneeId}">${entry.assignee}</button></td>
          <td class="num">${entry.total}</td>
          <td class="num">${entry.jira_start_date}</td>
          <td class="num">${entry.jira_due_date}</td>
          <td class="num">${entry.original_estimate}</td>
        `;
        summaryRowsNode.appendChild(tr);

        const detailRow = document.createElement("tr");
        detailRow.className = "assignee-detail-row";
        detailRow.id = assigneeId;
        const itemsHtml = entry.rows
          .slice()
          .sort((a, b) => asText(a.issue_key).localeCompare(asText(b.issue_key)))
          .map((row) => {
            const link = asText(row.jira_url);
            const misses = (row._misses || [])
              .map((field) => `<span class="missed-field">${fieldLabels[field] || field}</span>`)
              .join("");
            const issue = asText(row.issue_key);
            const issueHtml = link
              ? `<a class="jira-link" href="${link}" target="_blank" rel="noopener noreferrer">${issue}</a>`
              : issue;
            const hoursLogged = asText(row.resource_logged_hours).toLowerCase() === "yes";
            const hoursChip = hoursLogged
              ? '<span class="status-chip status-yes">Yes</span>'
              : '<span class="status-chip status-no">No</span>';
            return `
              <tr>
                <td>${issueHtml}</td>
                <td>${asText(row.issue_type) || "-"}</td>
                <td>${misses || '<span class="empty">None</span>'}</td>
                <td>${hoursChip}</td>
              </tr>
            `;
          })
          .join("");
        detailRow.innerHTML = `
          <td colspan="5" class="assignee-detail-cell">
            <table class="detail-workitem-table">
              <thead>
                <tr>
                  <th>Work Item</th>
                  <th>Issue Type</th>
                  <th>Missing Fields</th>
                  <th>Resource Logged Hours</th>
                </tr>
              </thead>
              <tbody>
                ${itemsHtml || '<tr><td colspan="4" class="assignee-jira-item empty">No Jira rows.</td></tr>'}
              </tbody>
            </table>
          </td>
        `;
        summaryRowsNode.appendChild(detailRow);
      }

      summaryRowsNode.querySelectorAll(".assignee-toggle").forEach((button) => {
        button.addEventListener("click", () => {
          const targetId = button.getAttribute("data-target");
          const row = document.getElementById(targetId);
          if (!row) return;
          row.classList.toggle("open");
        });
      });
    }

    function buildSummaryRows(items) {
      const byAssignee = new Map();
      for (const row of items) {
        const assignee = normalizeAssignee(row.assignee);
        if (!byAssignee.has(assignee)) {
          byAssignee.set(assignee, {
            assignee,
            total: 0,
            jira_start_date: 0,
            jira_due_date: 0,
            original_estimate: 0,
          });
        }
        const entry = byAssignee.get(assignee);
        entry.total += 1;
        for (const field of row._misses || []) {
          entry[field] += 1;
        }
      }
      return Array.from(byAssignee.values()).sort((a, b) => {
        const byTotal = b.total - a.total;
        if (byTotal !== 0) return byTotal;
        return a.assignee.localeCompare(b.assignee);
      });
    }

    function exportToExcel() {
      const items = buildFilteredRows();
      if (!items.length) {
        alert("No missed entries for current filters.");
        return;
      }
      if (!window.XLSX) {
        alert("Excel export library failed to load. Refresh and try again.");
        return;
      }

      const detailsRows = items
        .slice()
        .sort((a, b) => normalizeAssignee(a.assignee).localeCompare(normalizeAssignee(b.assignee)) || asText(a.issue_key).localeCompare(asText(b.issue_key)))
        .map((row) => {
          const misses = (row._misses || []).map((field) => fieldLabels[field] || field).join(", ");
          return {
            "Assignee": normalizeAssignee(row.assignee),
            "Work Item": asText(row.issue_key),
            "Issue Type": asText(row.issue_type),
            "Missing Fields": misses,
            "Resource Logged Hours": asText(row.resource_logged_hours),
            "Jira Planned Start Date": asText(row.jira_start_date),
            "Jira Planned Due Date": asText(row.jira_due_date),
            "Original Estimates": asText(row.original_estimate),
            "Summary": asText(row.summary),
            "Jira URL": asText(row.jira_url),
          };
        });

      const summaryRows = buildSummaryRows(items).map((entry) => ({
        "Assignee": entry.assignee,
        "Total Missed": entry.total,
        "Planned Start Missing": entry.jira_start_date,
        "Planned Due Missing": entry.jira_due_date,
        "Original Estimate Missing": entry.original_estimate,
      }));

      const wb = XLSX.utils.book_new();
      const wsSummary = XLSX.utils.json_to_sheet(summaryRows);
      const wsDetails = XLSX.utils.json_to_sheet(detailsRows);
      XLSX.utils.book_append_sheet(wb, wsSummary, "Summary");
      XLSX.utils.book_append_sheet(wb, wsDetails, "Details");

      const stamp = new Date().toISOString().replace(/[-:]/g, "").replace(/\.\d+Z$/, "Z");
      const fileName = `missed_entries_export_${stamp}.xlsx`;
      XLSX.writeFile(wb, fileName);
    }

    function rerender() {
      normalizeMonths();
      const filtered = buildFilteredRows();
      renderSummary(filtered);
    }

    dateFromInput.value = selectedDateFromMonth;
    dateToInput.value = selectedDateToMonth;

    dateFromInput.addEventListener("change", () => {
      selectedDateFromMonth = dateFromInput.value || DEFAULT_DATE_FROM_MONTH;
      rerender();
    });
    dateToInput.addEventListener("change", () => {
      selectedDateToMonth = dateToInput.value || DEFAULT_DATE_TO_MONTH;
      rerender();
    });
    dateResetButton.addEventListener("click", () => {
      selectedDateFromMonth = DEFAULT_DATE_FROM_MONTH;
      selectedDateToMonth = DEFAULT_DATE_TO_MONTH;
      rerender();
    });
    refreshReportButton.addEventListener("click", () => {
      rerender();
    });
    fieldCheckboxes.forEach((node) => {
      node.addEventListener("change", () => {
        rerender();
      });
    });
    exportExcelButton.addEventListener("click", () => {
      exportToExcel();
    });

    rerender();
  </script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<script>
(function () {
  const seeded = [{"id": "missed_entries.total_missed", "label": "Total Missed Entries", "report": "missed_entries", "ui_targets": ["#total-missed-count"], "definition": "Count of rows missing selected mandatory planning fields.", "formula": "Count(rows where any selected missing field condition is true)", "ingredients": ["start_date", "end_date", "original_estimate", "missing_filter_selection"], "business_validations": ["Date range and field filters both affect totals."], "field_linkages": ["Summary table", "Assignee detail accordion"], "cross_report_linkages": ["employee.total_penalty", "dashboard.delivery_health"], "data_sources": ["1_jira_work_items_export.xlsx"], "leadership_interpretation": "Data quality indicator directly tied to planning confidence."}];
  const byId = Object.create(null);
  function txt(v) { return String(v == null ? "" : v).trim(); }
  function asArr(v) { return Array.isArray(v) ? v : []; }
  function slug(v) { return txt(v).toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/(^-|-$)/g, "") || "info"; }
  function listHtml(values) {
    const vals = asArr(values).map((x) => txt(x)).filter(Boolean);
    if (!vals.length) return "<p>-</p>";
    return "<ul class=\"report-info-list\">" + vals.map((x) => "<li>" + esc(x) + "</li>").join("") + "</ul>";
  }
  function esc(v) {
    return txt(v).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  }
  function addCatalog(item) {
    if (!item || !txt(item.id)) return;
    byId[item.id] = Object.assign({
      id: txt(item.id), label: "Field", report: txt(window.__activeReportId || ""),
      ui_targets: [], definition: "", formula: "", ingredients: [],
      business_validations: [], field_linkages: [], cross_report_linkages: [],
      data_sources: [], leadership_interpretation: ""
    }, item);
  }
  for (const item of asArr(seeded)) addCatalog(item);
  function ensureInfoButton(host, infoId, label) {
    if (!host || !txt(infoId)) return;
    if (host.querySelector && host.querySelector('[data-info-id="' + infoId + '"]')) return;
    const btn = document.createElement("button");
    btn.type = "button";
    btn.className = "report-info-inline-btn";
    btn.textContent = "i";
    btn.setAttribute("data-info-id", infoId);
    btn.setAttribute("aria-label", (txt(label) || "Field") + " information");
    host.appendChild(btn);
  }
  function extractFromTooltips() {
    const defs = [
      [".score-info", ".score-info-tip"],
      [".kpi-info", ".kpi-info-tip"],
      [".stat-info", ".stat-info-tip"],
      [".card-i-wrap", ".card-i-tip"]
    ];
    for (const pair of defs) {
      const wrapSel = pair[0];
      const tipSel = pair[1];
      const wraps = Array.from(document.querySelectorAll(wrapSel));
      for (const wrap of wraps) {
        const tip = wrap.querySelector(tipSel);
        const raw = txt(tip ? tip.textContent : "");
        const parentLabelNode = wrap.closest(".score-label,.label,.k,.story-title,h3,h4,.card,.kpi,.stat,.summary-card");
        const label = txt(parentLabelNode ? parentLabelNode.textContent : "");
        const id = wrap.getAttribute("data-info-id") || slug((window.__activeReportId || "report") + "-" + (label || raw.slice(0, 36)));
        wrap.setAttribute("data-info-id", id);
        wrap.setAttribute("role", "button");
        wrap.setAttribute("tabindex", "0");
        if (tip) tip.style.display = "none";
        if (!byId[id]) {
          addCatalog({
            id: id,
            label: label || "Field",
            report: txt(window.__activeReportId || ""),
            ui_targets: [],
            definition: "Auto-captured from report tooltip content.",
            formula: raw.split("\n")[0] || raw,
            ingredients: [],
            business_validations: [],
            field_linkages: [],
            cross_report_linkages: [],
            data_sources: [],
            leadership_interpretation: raw
          });
        }
      }
    }
  }
  extractFromTooltips();
  for (const item of Object.values(byId)) {
    for (const selector of asArr(item.ui_targets)) {
      try {
        const nodes = Array.from(document.querySelectorAll(selector));
        for (const node of nodes) {
          const target = node.querySelector ? (node.querySelector(".label,.k,.score-label,h2,h3,h4,th") || node) : node;
          ensureInfoButton(target, item.id, item.label);
        }
      } catch (_err) {}
    }
  }
  const backdrop = document.getElementById("report-info-drawer-backdrop");
  const drawer = document.getElementById("report-info-drawer");
  const drawerBody = document.getElementById("report-info-drawer-body");
  const closeBtn = document.getElementById("report-info-drawer-close");
  let activeId = "";
  let lastFocus = null;
  function sectionHtml(title, contentHtml) {
    return '<section class="report-info-section"><h4>' + esc(title) + '</h4>' + contentHtml + '</section>';
  }
  function render(item) {
    if (!item) {
      drawerBody.innerHTML = "<p>No information is configured for this field yet.</p>";
      return;
    }
    drawerBody.innerHTML =
      sectionHtml("Definition", "<p>" + esc(item.definition || "-") + "</p>") +
      sectionHtml("Formula", "<p>" + esc(item.formula || "-") + "</p>") +
      sectionHtml("Ingredients", listHtml(item.ingredients)) +
      sectionHtml("Business Validations", listHtml(item.business_validations)) +
      sectionHtml("Linked Fields (This Report)", listHtml(item.field_linkages)) +
      sectionHtml("Cross-Report Linkages", listHtml(item.cross_report_linkages)) +
      sectionHtml("Data Sources", listHtml(item.data_sources)) +
      sectionHtml("Leadership Interpretation", "<p>" + esc(item.leadership_interpretation || "-") + "</p>");
    const title = document.getElementById("report-info-drawer-title");
    if (title) title.textContent = txt(item.label) || "Field Information";
  }
  function openDrawer(id) {
    const item = byId[id];
    activeId = id;
    lastFocus = document.activeElement;
    render(item);
    backdrop.classList.add("is-open");
    drawer.classList.add("is-open");
    drawer.setAttribute("aria-hidden", "false");
    document.body.classList.add("report-info-drawer-open");
    if (closeBtn) closeBtn.focus();
  }
  function closeDrawer() {
    activeId = "";
    backdrop.classList.remove("is-open");
    drawer.classList.remove("is-open");
    drawer.setAttribute("aria-hidden", "true");
    document.body.classList.remove("report-info-drawer-open");
    if (lastFocus && lastFocus.focus) lastFocus.focus();
  }
  function triggerFromEvent(e) {
    const el = e.target.closest("[data-info-id]");
    if (!el) return;
    const id = txt(el.getAttribute("data-info-id"));
    if (!id) return;
    e.preventDefault();
    openDrawer(id);
  }
  document.addEventListener("click", triggerFromEvent);
  document.addEventListener("keydown", function (e) {
    if (e.key === "Escape" && activeId) {
      e.preventDefault();
      closeDrawer();
      return;
    }
    const inInfo = e.target && e.target.closest && e.target.closest("[data-info-id]");
    if (inInfo && (e.key === "Enter" || e.key === " ")) {
      e.preventDefault();
      openDrawer(txt(inInfo.getAttribute("data-info-id")));
    }
    if (!activeId || e.key !== "Tab") return;
    const f = drawer.querySelectorAll("button,[href],[tabindex]:not([tabindex='-1'])");
    const nodes = Array.from(f).filter((x) => !x.disabled);
    if (!nodes.length) return;
    const first = nodes[0];
    const last = nodes[nodes.length - 1];
    if (e.shiftKey && document.activeElement === first) { e.preventDefault(); last.focus(); }
    else if (!e.shiftKey && document.activeElement === last) { e.preventDefault(); first.focus(); }
  });
  closeBtn.addEventListener("click", closeDrawer);
  backdrop.addEventListener("click", closeDrawer);
  window.reportInfoCatalog = Object.values(byId);
})();

  height: 10px;
  overflow: hidden;
  border-radius: 999px;
  background: rgba(148, 163, 184, 0.18);
  border: 1px solid rgba(148, 163, 184, 0.18);
}
#codex-refresh-progress-fill {
  position: absolute;
  inset: 0 auto 0 0;
  width: 0%;
  border-radius: inherit;
  background: linear-gradient(90deg, #06b6d4 0%, #22c55e 100%);
  box-shadow: 0 0 14px rgba(34, 197, 94, 0.35);
  transition: width 0.35s ease;
}
.codex-progress-stats {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 10px;
  margin-top: 12px;
}
.codex-progress-stat {
  padding: 10px 12px;
  border-radius: 12px;
  background: rgba(15, 23, 42, 0.48);
  border: 1px solid rgba(148, 163, 184, 0.14);
}
.codex-progress-stat-label {
  display: block;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  color: rgba(191, 219, 254, 0.74);
}
.codex-progress-stat-value {
  display: block;
  margin-top: 4px;
  font-size: 19px;
  font-weight: 800;
  color: #f8fafc;
}
.codex-progress-current {
  margin-top: 12px;
  display: grid;
  gap: 6px;
}
.codex-progress-current strong {
  color: #f8fafc;
  font-size: 13px;
}
.codex-progress-current span {
  color: rgba(226, 232, 240, 0.82);
  font-size: 12px;
}
#codex-refresh-progress-items {
  display: grid;
  gap: 8px;
  margin-top: 14px;
}
.codex-progress-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  padding: 10px 12px;
  border-radius: 12px;
  background: rgba(15, 23, 42, 0.4);
  border: 1px solid rgba(148, 163, 184, 0.14);
}
.codex-progress-item-main {
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.codex-progress-item-label {
  font-size: 12px;
  font-weight: 700;
  color: #f8fafc;
}
.codex-progress-item-detail {
  font-size: 11px;
  color: rgba(203, 213, 225, 0.72);
}
.codex-progress-item-state {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 88px;
  padding: 4px 8px;
  border-radius: 999px;
  font-size: 10px;
  font-weight: 800;
  letter-spacing: 0.04em;
  text-transform: uppercase;
}
.codex-progress-item[data-state="done"] .codex-progress-item-state {
  background: rgba(34, 197, 94, 0.18);
  color: #bbf7d0;
}
.codex-progress-item[data-state="running"] .codex-progress-item-state {
  background: rgba(6, 182, 212, 0.2);
  color: #a5f3fc;
}
.codex-progress-item[data-state="failed"] .codex-progress-item-state {
  background: rgba(248, 113, 113, 0.18);
  color: #fecaca;
}
.codex-progress-item[data-state="pending"] .codex-progress-item-state {
  background: rgba(148, 163, 184, 0.18);
  color: #cbd5e1;
}
.codex-progress-item[data-state="cancel_requested"] .codex-progress-item-state,
.codex-progress-item[data-state="canceled"] .codex-progress-item-state {
  background: rgba(251, 191, 36, 0.16);
  color: #fde68a;
}
.codex-refresh-inline-host #codex-refresh-wrap,
#codex-refresh-wrap.codex-refresh-inline {
  margin-top: 0;
  margin-left: 8px;
  flex-direction: row;
  align-items: center;
  justify-content: flex-end;
  gap: 8px;
}
.codex-refresh-inline-host #codex-refresh-btn,
#codex-refresh-wrap.codex-refresh-inline #codex-refresh-btn {
  width: auto;
  min-width: 120px;
  white-space: nowrap;
}
.codex-refresh-inline-host #codex-refresh-cancel-btn,
#codex-refresh-wrap.codex-refresh-inline #codex-refresh-cancel-btn {
  width: auto;
  white-space: nowrap;
}
.codex-refresh-inline-host #codex-refresh-status,
#codex-refresh-wrap.codex-refresh-inline #codex-refresh-status {
  min-height: 0;
  color: #475569;
  white-space: nowrap;
}
@media (max-width: 980px) {
  .codex-progress-stats {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }
}
</style>
<div id="codex-refresh-wrap" aria-live="polite">
  <button id="codex-refresh-btn" type="button">
    <span class="material-symbols-outlined" aria-hidden="true">refresh</span>
    <span id="codex-refresh-btn-label">Refresh</span>
  </button>
  <button id="codex-refresh-cancel-btn" type="button">Cancel Refresh Run</button>
  <div id="codex-refresh-status"></div>
</div>
<script>
(function () {
  const reportId = 'missed_entries';
  const endpointPath = "/api/report/refresh";
  const isMissedEntries = reportId === "missed_entries";
  const isNestedView = reportId === "nested_view";
  const usesAsyncProgress = isMissedEntries || isNestedView;
  const wrap = document.getElementById("codex-refresh-wrap");
  const btn = document.getElementById("codex-refresh-btn");
  const cancelBtn = document.getElementById("codex-refresh-cancel-btn");
  const btnLabel = document.getElementById("codex-refresh-btn-label");
  const status = document.getElementById("codex-refresh-status");
  if (!wrap || !btn || !btnLabel || !status || !reportId) return;
  let activeRunId = "";
  let pollTimer = 0;

  if (!usesAsyncProgress && cancelBtn) {
    cancelBtn.style.display = "none";
  } else if (cancelBtn) {
    cancelBtn.style.display = "";
    cancelBtn.disabled = true;
  }

  function createProgressPanel() {
    let panel = document.getElementById("codex-refresh-progress");
    if (panel) return panel;
    panel = document.createElement("div");
    panel.id = "codex-refresh-progress";
    panel.innerHTML = `
      <div class="codex-progress-header">
        <div class="codex-progress-title">
          <strong>Live Refresh Progress</strong>
          <span id="codex-refresh-progress-subtitle">Waiting to start.</span>
        </div>
        <div id="codex-refresh-progress-pill">Idle</div>
      </div>
      <div id="codex-refresh-progress-bar" aria-hidden="true">
        <div id="codex-refresh-progress-fill"></div>
      </div>
      <div class="codex-progress-stats">
        <div class="codex-progress-stat">
          <span class="codex-progress-stat-label">Total Items</span>
          <span class="codex-progress-stat-value" id="codex-progress-total">0</span>
        </div>
        <div class="codex-progress-stat">
          <span class="codex-progress-stat-label">Processed</span>
          <span class="codex-progress-stat-value" id="codex-progress-processed">0</span>
        </div>
        <div class="codex-progress-stat">
          <span class="codex-progress-stat-label">Remaining</span>
          <span class="codex-progress-stat-value" id="codex-progress-remaining">0</span>
        </div>
        <div class="codex-progress-stat">
          <span class="codex-progress-stat-label">Progress</span>
          <span class="codex-progress-stat-value" id="codex-progress-percent">0%</span>
        </div>
      </div>
      <div class="codex-progress-current">
        <strong id="codex-progress-current-item">No active item</strong>
        <span id="codex-progress-current-detail">Progress details will appear here.</span>
      </div>
      <div id="codex-refresh-progress-items"></div>
    `;
    wrap.insertAdjacentElement("afterend", panel);
    return panel;
  }

  const progressPanel = createProgressPanel();
  const progressSubtitle = progressPanel.querySelector("#codex-refresh-progress-subtitle");
  const progressPill = progressPanel.querySelector("#codex-refresh-progress-pill");
  const progressFill = progressPanel.querySelector("#codex-refresh-progress-fill");
  const progressTotal = progressPanel.querySelector("#codex-progress-total");
  const progressProcessed = progressPanel.querySelector("#codex-progress-processed");
  const progressRemaining = progressPanel.querySelector("#codex-progress-remaining");
  const progressPercent = progressPanel.querySelector("#codex-progress-percent");
  const progressCurrentItem = progressPanel.querySelector("#codex-progress-current-item");
  const progressCurrentDetail = progressPanel.querySelector("#codex-progress-current-detail");
  const progressItems = progressPanel.querySelector("#codex-refresh-progress-items");

  function mountRefreshWidget() {
    const primaryTargets = [
      ".header-actions",
      ".report-header .header-actions",
      ".report-header-actions",
      ".page-actions",
      ".toolbar",
      ".report-toolbar",
      ".filters-and-actions",
      ".actions-bar",
    ];
    for (const selector of primaryTargets) {
      const target = document.querySelector(selector);
      if (target) {
        target.classList.add("codex-refresh-inline-host");
        wrap.classList.add("codex-refresh-inline");
        target.appendChild(wrap);
        return true;
      }
    }
    wrap.classList.remove("codex-refresh-inline");
    const navTargets = [
      ".app-sidebar .sidebar-nav",
      ".unified-nav .unified-nav-list",
      ".sidebar-nav",
      ".unified-nav-list",
    ];
    for (const selector of navTargets) {
      const target = document.querySelector(selector);
      if (target) {
        target.appendChild(wrap);
        return true;
      }
    }
    return false;
  }

  if (!mountRefreshWidget()) {
    const observer = new MutationObserver(function () {
      if (mountRefreshWidget()) {
        observer.disconnect();
      }
    });
    observer.observe(document.documentElement, { childList: true, subtree: true });
    window.setTimeout(function () { observer.disconnect(); }, 5000);
  }

  function setBusy(isBusy) {
    btn.disabled = !!isBusy;
    btnLabel.textContent = isBusy ? "Refreshing..." : "Refresh";
    if (usesAsyncProgress && cancelBtn) {
      cancelBtn.disabled = !isBusy || !activeRunId;
    }
  }

  function setStatus(msg) {
    status.textContent = msg || "";
  }

  function endpointCandidates(path) {
    const endpointSuffix = String(path || endpointPath);
    if (window.location.protocol === "http:" || window.location.protocol === "https:") {
      return [endpointSuffix];
    }
    const savedOrigin = String(localStorage.getItem("codex-report-server-origin") || "").trim();
    const defaults = [
      "http://127.0.0.1:8000",
      "http://localhost:8000",
      "http://127.0.0.1:5000",
      "http://localhost:5000",
    ];
    const origins = [savedOrigin, ...defaults]
      .map((item) => String(item || "").trim().replace(/\/$/, ""))
      .filter(Boolean);
    return Array.from(new Set(origins)).map((origin) => origin + endpointSuffix);
  }

  async function requestJson(path, options) {
    const endpoints = endpointCandidates(path);
    let lastError = "Failed to fetch";
    for (const endpoint of endpoints) {
      try {
        const response = await fetch(endpoint, options || {});
        if (endpoint.startsWith("http")) {
          try {
            localStorage.setItem("codex-report-server-origin", new URL(endpoint).origin);
          } catch (_err) {}
        }
        const payload = await response.json().catch(() => ({}));
        return { response, payload };
      } catch (err) {
        lastError = (err && err.message) ? err.message : String(err);
      }
    }
    throw new Error(lastError);
  }

  function runStatusText(run) {
    const item = run || {};
    const state = String(item.status || "").toLowerCase();
    const pct = Number(item.progress_pct || 0);
    const step = String(item.progress_step || "");
    if (state === "running") {
      return `Refresh running${step ? ` (${step})` : ""}${pct > 0 ? ` - ${pct}%` : ""}`;
    }
    if (state === "cancel_requested") {
      return "Cancel requested. Waiting for safe stop...";
    }
    if (state === "success") {
      return "Refresh completed.";
    }
    if (state === "canceled") {
      return String(item.error_message || "Refresh canceled. Previous snapshot retained.");
    }
    if (state === "failed") {
      return String(item.error_message || "Refresh failed.");
    }
    return "";
  }

  function labelForState(state) {
    const normalized = String(state || "").toLowerCase();
    if (normalized === "done") return "Done";
    if (normalized === "running") return "Running";
    if (normalized === "failed") return "Failed";
    if (normalized === "cancel_requested") return "Cancel Requested";
    if (normalized === "canceled") return "Canceled";
    return "Pending";
  }

  function showProgressPanel(visible) {
    if (!progressPanel) return;
    progressPanel.classList.toggle("codex-visible", !!visible);
  }

  function renderProgress(run) {
    if (!progressPanel) return;
    const item = run || {};
    const stats = item.stats || {};
    const total = Math.max(0, Number(stats.total_items || 0));
    const processed = Math.max(0, Number(stats.processed_items || 0));
    const remaining = Math.max(0, Number(stats.remaining_items || Math.max(0, total - processed)));
    const pct = Math.max(0, Math.min(100, Number(item.progress_pct || (total ? Math.round((processed / total) * 100) : 0))));
    const state = String(item.status || "").toLowerCase() || "pending";
    const currentItem = String(stats.current_item || item.progress_step || "Waiting to start");
    const currentDetail = String(stats.current_detail || runStatusText(item) || "Progress details will appear here.");
    const subtitle = runStatusText(item) || "Waiting to start.";
    const items = Array.isArray(stats.items) ? stats.items : [];

    showProgressPanel(usesAsyncProgress || total > 0 || processed > 0);
    progressSubtitle.textContent = subtitle;
    progressPill.textContent = labelForState(state);
    progressFill.style.width = `${pct}%`;
    progressTotal.textContent = String(total);
    progressProcessed.textContent = String(processed);
    progressRemaining.textContent = String(remaining);
    progressPercent.textContent = `${pct}%`;
    progressCurrentItem.textContent = currentItem || "Waiting to start";
    progressCurrentDetail.textContent = currentDetail;
    progressItems.innerHTML = "";
    items.forEach((entry) => {
      const row = document.createElement("div");
      const entryState = String(entry && entry.status || "pending").toLowerCase();
      row.className = "codex-progress-item";
      row.dataset.state = entryState;
      const entryLabel = String(entry && entry.label || entry && entry.key || "Step");
      const entryDetail = entryState === "running"
        ? (currentDetail || "Currently processing...")
        : (entryState === "done" ? "Completed successfully." : (entryState === "failed" ? "Stopped with an error." : "Waiting in queue."));
      row.innerHTML = `
        <div class="codex-progress-item-main">
          <span class="codex-progress-item-label"></span>
          <span class="codex-progress-item-detail"></span>
        </div>
        <span class="codex-progress-item-state"></span>
      `;
      row.querySelector(".codex-progress-item-label").textContent = entryLabel;
      row.querySelector(".codex-progress-item-detail").textContent = entryDetail;
      row.querySelector(".codex-progress-item-state").textContent = labelForState(entryState);
      progressItems.appendChild(row);
    });
  }

  function clearPolling() {
    if (pollTimer) {
      window.clearTimeout(pollTimer);
      pollTimer = 0;
    }
  }

  async function pollMissedEntriesRun(runId) {
    const runIdText = String(runId || "").trim();
    if (!runIdText) return;
    activeRunId = runIdText;
    setBusy(true);
    clearPolling();
    const tick = async function () {
      try {
        const result = await requestJson(`/api/missed-entries/refresh/${encodeURIComponent(runIdText)}`, {
          method: "GET",
          headers: { "Accept": "application/json" },
        });
        const payload = result.payload || {};
        const run = payload.run || {};
        const state = String(run.status || "").toLowerCase();
        setStatus(runStatusText(run));
        if (state === "running" || state === "cancel_requested") {
          setBusy(true);
          pollTimer = window.setTimeout(tick, 1200);
          return;
        }
        clearPolling();
        activeRunId = "";
        setBusy(false);
        if (state === "success") {
          window.location.reload();
        }
      } catch (err) {
        clearPolling();
        activeRunId = "";
        setBusy(false);
        const msg = (err && err.message) ? err.message : String(err);
        setStatus(msg || "Failed to poll refresh status.");
      }
    };
    tick();
  }

  async function pollAsyncReportRun(runId) {
    const runIdText = String(runId || "").trim();
    if (!runIdText) return;
    activeRunId = runIdText;
    setBusy(true);
    showProgressPanel(true);
    clearPolling();
    const tick = async function () {
      try {
        const result = await requestJson(`/api/report-refresh/${encodeURIComponent(runIdText)}`, {
          method: "GET",
          headers: { "Accept": "application/json" },
        });
        const payload = result.payload || {};
        const run = payload.run || {};
        const state = String(run.status || "").toLowerCase();
        setStatus(runStatusText(run));
        renderProgress(run);
        if (state === "running" || state === "cancel_requested") {
          setBusy(true);
          pollTimer = window.setTimeout(tick, 1000);
          return;
        }
        clearPolling();
        activeRunId = "";
        setBusy(false);
        if (state === "success") {
          window.setTimeout(function () {
            window.location.reload();
          }, 500);
        }
      } catch (err) {
        clearPolling();
        activeRunId = "";
        setBusy(false);
        const msg = (err && err.message) ? err.message : String(err);
        setStatus(msg || "Failed to poll refresh status.");
      }
    };
    tick();
  }

  btn.addEventListener("click", async function () {
    setBusy(true);
    setStatus(isNestedView ? "Starting live refresh..." : "Running scripts...");
    if (isNestedView) {
      renderProgress({
        status: "running",
        progress_pct: 1,
        progress_step: "queued",
        stats: {
          total_items: 3,
          processed_items: 0,
          remaining_items: 3,
          current_item: "Queueing refresh run",
          current_detail: "Preparing live progress tracker.",
          items: [
            { key: "validate_canonical", label: "Validate canonical dataset", status: "running" },
            { key: "generate_nested_view_html", label: "Generate nested view report", status: "pending" },
            { key: "sync_report_html", label: "Sync report output", status: "pending" },
          ],
        },
      });
    }
    try {
      if (isNestedView) {
        const result = await requestJson("/api/report-refresh/start", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ report: reportId }),
        });
        const response = result.response;
        const payload = result.payload || {};
        if (!response.ok || !payload.ok) {
          const msg = payload.error || "Refresh failed.";
          setStatus(msg);
          alert(msg);
          renderProgress((payload && payload.run) || {
            status: "failed",
            progress_pct: 0,
            stats: {
              total_items: 3,
              processed_items: 0,
              remaining_items: 3,
              current_item: "Refresh failed to start",
              current_detail: msg,
              items: [],
            },
          });
          return;
        }
        const run = payload.run || {};
        const runId = String(payload.run_id || run.run_id || "").trim();
        if (!runId) {
          setBusy(false);
          setStatus("Refresh started but no run ID was returned.");
          return;
        }
        renderProgress(run);
        await pollAsyncReportRun(runId);
        return;
      }

      if (!isMissedEntries) {
        const result = await requestJson(endpointPath, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ report: reportId }),
        });
        const response = result.response;
        const payload = result.payload || {};
        if (!response.ok || !payload.ok) {
          const msg = payload.error || "Refresh failed.";
          setStatus(msg);
          alert(msg);
          return;
        }
        const ts = payload.completed_at || "";
        setStatus(ts ? ("Updated: " + ts) : "Updated.");
        window.location.reload();
        return;
      }

      const result = await requestJson("/api/missed-entries/refresh", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({}),
      });
      const response = result.response;
      const payload = result.payload || {};
      if (!response.ok || !payload.ok) {
        const msg = payload.error || "Refresh failed.";
        setStatus(msg);
        alert(msg);
        return;
      }
      const run = payload.run || {};
      const runId = String(payload.run_id || run.run_id || "").trim();
      if (!runId) {
        setBusy(false);
        setStatus("Refresh started but no run ID was returned.");
        return;
      }
      setStatus(runStatusText(run) || "Refresh started.");
      await pollMissedEntriesRun(runId);
    } catch (err) {
      const base = (err && err.message) ? err.message : String(err);
      const hint = "If report is opened from file path, use server URL like http://127.0.0.1:8000/dashboard.html";
      const msg = base ? (base + ". " + hint) : hint;
      setStatus(msg);
      alert(msg);
    } finally {
      if (!usesAsyncProgress) {
        setBusy(false);
      }
    }
  });

  if (usesAsyncProgress && cancelBtn) {
    cancelBtn.addEventListener("click", async function () {
      if (!activeRunId) return;
      cancelBtn.disabled = true;
      try {
        const cancelPath = isNestedView ? "/api/report-refresh/cancel" : "/api/missed-entries/cancel";
        const body = isNestedView ? { run_id: activeRunId, report: reportId } : { run_id: activeRunId };
        const result = await requestJson(cancelPath, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body),
        });
        const response = result.response;
        const payload = result.payload || {};
        if (!response.ok || !payload.ok) {
          const msg = payload.error || "Cancel failed.";
          setStatus(msg);
          alert(msg);
          cancelBtn.disabled = false;
          return;
        }
        setStatus(String(payload.message || "Cancel requested. Waiting for safe stop..."));
      } catch (err) {
        const msg = (err && err.message) ? err.message : String(err);
        setStatus(msg || "Cancel failed.");
        cancelBtn.disabled = false;
      }
    });

    (async function attachCurrentRun() {
      try {
        const currentPath = isNestedView
          ? `/api/report-refresh/current?report=${encodeURIComponent(reportId)}`
          : "/api/missed-entries/refresh/current";
        const result = await requestJson(currentPath, {
          method: "GET",
          headers: { "Accept": "application/json" },
        });
        const payload = result.payload || {};
        const run = payload.run || null;
        if (!run) return;
        const state = String(run.status || "").toLowerCase();
        renderProgress(run);
        if (state === "running" || state === "cancel_requested") {
          setStatus(runStatusText(run));
          if (isNestedView) {
            await pollAsyncReportRun(String(run.run_id || ""));
          } else {
            await pollMissedEntriesRun(String(run.run_id || ""));
          }
        } else if (state) {
          setStatus(runStatusText(run));
        }
      } catch (_err) {
        // Best effort only.
      }
    })();
  }
})();
</script>
<!-- codex-refresh-widget-end -->
