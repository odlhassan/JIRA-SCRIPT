      --muted: #5f6f7f;
      --title: #0c4054;
      --head: #0f4c5c;
      --head-text: #ffffff;
      --phase-col: 260px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--text);
      font-family: "Segoe UI", Tahoma, Verdana, sans-serif;
      background:

        linear-gradient(180deg, #f4f8fb, var(--bg));
    }
    .page {
      max-width: 1880px;
      margin: 0 auto;
      padding: 16px;
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 12px;
    }
    .title {
      margin: 0 0 6px;
      font-size: 1.25rem;
      color: var(--title);
    }
    .meta {
      margin: 0;
      color: var(--muted);
      font-size: 0.9rem;
    }
    .controls {
      margin-top: 10px;
      display: flex;
      flex-wrap: wrap;
      align-items: end;
      gap: 10px;
    }
    .control {
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 180px;
    }
    .control label {
      font-size: 0.8rem;
      color: #314756;
      font-weight: 600;
    }
    .control input {
      border: 1px solid #b9cad5;
      border-radius: 8px;
      padding: 7px 9px;
      font-size: 0.9rem;
      color: #102c3b;
      background: #fff;
    }
    .control input:focus {
      outline: none;
      border-color: #2a6274;
      box-shadow: 0 0 0 2px rgba(42, 98, 116, 0.16);
    }
    .btn {
      border: 1px solid #255f73;
      background: #0f4c5c;
      color: #fff;
      border-radius: 8px;
      padding: 7px 12px;
      font-size: 0.86rem;
      cursor: pointer;
      height: 34px;
    }
    .btn.alt {
      background: #fff;
      color: #255f73;
    }
    .legend {
      margin-top: 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      color: #506575;
      font-size: 0.78rem;
    }
    .legend-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: 1px solid #d8e4ee;
      border-radius: 999px;
      padding: 3px 8px;
      background: #f8fbff;
    }
    .chip-dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: #93c5fd;
    }
    .gantt-wrap {

      border: 1px solid var(--line);
      border-radius: 12px;
      overflow: auto;
      max-height: 76vh;
    }
    .gantt-root {
      min-width: 860px;
    }
    .grid {
      min-width: max-content;
      border-collapse: separate;
      border-spacing: 0;
    }
    .grid-row {
      display: grid;
      grid-template-columns: var(--phase-col) 1fr;
      min-width: max-content;
    }
    .cell {
      border-top: 1px solid var(--line);
      background: #fff;
    }
    .head .cell {
      position: sticky;
      top: 0;
      z-index: 40;
      border-top: 0;
      background: var(--head);
      color: var(--head-text);
      font-weight: 700;

    .head .phase-cell {

      border-right: 1px solid rgba(255,255,255,0.18);
    }
    .head .timeline-cell {
      padding: 0;
      z-index: 38;
    }
    .phase-cell {
      position: sticky;
      left: 0;
      z-index: 22;
      border-right: 1px solid var(--line);
      padding: 10px 12px;
      background: #fff;
      min-width: var(--phase-col);
      max-width: var(--phase-col);

    .phase-title {
      font-size: 0.88rem;
      font-weight: 700;
      color: #0f3040;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .phase-sub {
      margin-top: 3px;
      font-size: 0.74rem;
      color: #637a8a;
    }
    .load-row {
      margin-top: 7px;
      display: grid;
      grid-auto-flow: column;
      grid-auto-columns: 12px;
      gap: 3px;
      justify-content: start;
      align-items: center;
      overflow: hidden;
      max-width: 230px;
      min-height: 12px;
    }
    .load-chip {
      width: 12px;
      height: 10px;
      border-radius: 3px;
      border: 1px solid #d5e0e8;
      background: #eff4f8;
    }
    .timeline-cell {
      position: relative;
      overflow: hidden;
      min-height: 48px;
      background: #fff;
    }
    .lane-timeline {
      position: relative;
      padding: 8px 8px 10px;
    }
    .timeline-header {
      position: relative;
      min-height: 58px;
      background: #f8fbff;
      border-bottom: 1px solid #d4e0e9;
    }
    .month-block {
      position: absolute;
      top: 0;
      height: 22px;
      border-right: 1px solid #d0dce5;
      background: rgba(210, 228, 239, 0.35);
      color: #334f60;
      padding: 3px 6px;
      font-size: 0.72rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .week-block {
      position: absolute;
      top: 24px;
      height: 32px;
      border-right: 1px solid #d8e3eb;
      padding: 4px 6px;
      font-size: 0.72rem;
      color: #3b5565;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      background: rgba(255,255,255,0.62);
    }
    .week-block.current-week {
      background: rgba(251, 191, 36, 0.28);
      border: 1px solid rgba(180, 83, 9, 0.45);
      color: #7c2d12;
      font-weight: 700;
      z-index: 2;
    }
    .grid-line {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 1px;
      background: #e8eef3;
      pointer-events: none;
    }
    .week-line {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 1px;
      background: #d8e2ea;
      pointer-events: none;
    }
    .current-week-band {
      position: absolute;
      top: 0;
      bottom: 0;
      background: rgba(251, 191, 36, 0.13);
      border-left: 1px solid rgba(180, 83, 9, 0.4);
      border-right: 1px solid rgba(180, 83, 9, 0.4);
      pointer-events: none;
      z-index: 1;
    }
    .lane-empty {
      padding: 10px;
      font-size: 0.8rem;
      color: #7b8c99;
    }
    .card {
      position: absolute;
      min-height: 54px;
      border-radius: 9px;
      border: 1px solid rgba(15, 76, 92, 0.32);
      background: linear-gradient(180deg, rgba(219, 238, 247, 0.82), rgba(233, 246, 253, 0.95));

      overflow: hidden;

    .card-title {
      font-size: 0.76rem;
      color: #103547;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;

      font-size: 0.68rem;
      color: #375567;
      line-height: 1.32;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .empty {

      color: #607282;
      font-size: 0.9rem;
    }

    function parseIso(iso) {
      if (!iso) return null;
      const d = new Date(`${iso}T00:00:00`);
      if (Number.isNaN(d.getTime())) return null;
      return d;
    }

    function isoFromDate(d) {
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, "0");
      const day = String(d.getDate()).padStart(2, "0");
      return `${y}-${m}-${day}`;

    }

      return new Date(d.getFullYear(), d.getMonth(), 1);
    }

    function endOfMonth(d) {

    }

    function defaultRange() {

      return { from: prevMonthStart, to: nextMonthEnd, currentMonthStart };
    }

    function weekStartFor(dateObj) {
      const out = new Date(dateObj.getTime());
      const day = out.getDay();
      const shift = day === 0 ? 6 : day - 1;
      out.setDate(out.getDate() - shift);
      out.setHours(0, 0, 0, 0);
      return out;
    }

      today.setHours(0, 0, 0, 0);
      const weeks = [];
      let cursor = weekStartFor(rangeFrom);
      while (cursor <= rangeTo) {
        const start = new Date(cursor.getTime());
        const end = addDays(start, 6);
        const clippedStart = start < rangeFrom ? rangeFrom : start;
        const clippedEnd = end > rangeTo ? rangeTo : end;
        const totalDays = daysBetweenInclusive(rangeFrom, rangeTo);
        const leftDays = Math.floor((clippedStart.getTime() - rangeFrom.getTime()) / DAY_MS);
        const spanDays = daysBetweenInclusive(clippedStart, clippedEnd);
        weeks.push({

          end,

          isCurrent: today >= start && today <= end,
          leftPct: pctFromDays(leftDays, totalDays),
          widthPct: pctFromDays(spanDays, totalDays),
          label: `Wk of ${formatShortDate(start)}`,
        });
        cursor = addDays(cursor, 7);
      }
      return weeks;
    }

      const totalDays = daysBetweenInclusive(rangeFrom, rangeTo);

        const clippedStart = monthStart < rangeFrom ? rangeFrom : monthStart;

        const leftDays = Math.floor((clippedStart.getTime() - rangeFrom.getTime()) / DAY_MS);

<script>
(function () {
  const seeded = [{"id": "phase_rmi.weekly_load", "label": "Weekly Load Chips", "report": "phase_rmi_gantt_report", "ui_targets": ["#gantt-root"], "definition": "Phase lane chips summarize man-day intensity by week.", "formula": "Aggregate phase man-days overlapping each week bucket", "ingredients": ["phase_planned_start", "phase_planned_end", "phase_man_days"], "business_validations": ["Only dated phases participate in lane load chips."], "field_linkages": ["Visible RMIs", "Date range controls"], "cross_report_linkages": ["gantt.timeline_window", "ipp.roadmap_geometry"], "data_sources": ["nested view.xlsx"], "leadership_interpretation": "Shows phase-level delivery pressure and overload periods."}];
  const byId = Object.create(null);
  function txt(v) { return String(v == null ? "" : v).trim(); }
  function asArr(v) { return Array.isArray(v) ? v : []; }
  function slug(v) { return txt(v).toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/(^-|-$)/g, "") || "info"; }
  function listHtml(values) {
    const vals = asArr(values).map((x) => txt(x)).filter(Boolean);
    if (!vals.length) return "<p>-</p>";
    return "<ul class=\"report-info-list\">" + vals.map((x) => "<li>" + esc(x) + "</li>").join("") + "</ul>";
  }
  function esc(v) {
    return txt(v).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  }
  function addCatalog(item) {
    if (!item || !txt(item.id)) return;
    byId[item.id] = Object.assign({
      id: txt(item.id), label: "Field", report: txt(window.__activeReportId || ""),
      ui_targets: [], definition: "", formula: "", ingredients: [],
      business_validations: [], field_linkages: [], cross_report_linkages: [],
      data_sources: [], leadership_interpretation: ""
    }, item);
  }
  for (const item of asArr(seeded)) addCatalog(item);
  function ensureInfoButton(host, infoId, label) {
    if (!host || !txt(infoId)) return;
    if (host.querySelector && host.querySelector('[data-info-id="' + infoId + '"]')) return;
    const btn = document.createElement("button");
    btn.type = "button";
    btn.className = "report-info-inline-btn";
    btn.textContent = "i";
    btn.setAttribute("data-info-id", infoId);
    btn.setAttribute("aria-label", (txt(label) || "Field") + " information");
    host.appendChild(btn);
  }
  function extractFromTooltips() {
    const defs = [
      [".score-info", ".score-info-tip"],
      [".kpi-info", ".kpi-info-tip"],
      [".stat-info", ".stat-info-tip"],
      [".card-i-wrap", ".card-i-tip"]
    ];
    for (const pair of defs) {
      const wrapSel = pair[0];
      const tipSel = pair[1];
      const wraps = Array.from(document.querySelectorAll(wrapSel));
      for (const wrap of wraps) {
        const tip = wrap.querySelector(tipSel);
        const raw = txt(tip ? tip.textContent : "");
        const parentLabelNode = wrap.closest(".score-label,.label,.k,.story-title,h3,h4,.card,.kpi,.stat,.summary-card");
        const label = txt(parentLabelNode ? parentLabelNode.textContent : "");
        const id = wrap.getAttribute("data-info-id") || slug((window.__activeReportId || "report") + "-" + (label || raw.slice(0, 36)));
        wrap.setAttribute("data-info-id", id);
        wrap.setAttribute("role", "button");
        wrap.setAttribute("tabindex", "0");
        if (tip) tip.style.display = "none";
        if (!byId[id]) {
          addCatalog({
            id: id,
            label: label || "Field",
            report: txt(window.__activeReportId || ""),
            ui_targets: [],
            definition: "Auto-captured from report tooltip content.",
            formula: raw.split("\n")[0] || raw,
            ingredients: [],
            business_validations: [],
            field_linkages: [],
            cross_report_linkages: [],
            data_sources: [],
            leadership_interpretation: raw
          });
        }
      }
    }
  }
  extractFromTooltips();
  for (const item of Object.values(byId)) {
    for (const selector of asArr(item.ui_targets)) {
      try {
        const nodes = Array.from(document.querySelectorAll(selector));
        for (const node of nodes) {
          const target = node.querySelector ? (node.querySelector(".label,.k,.score-label,h2,h3,h4,th") || node) : node;
          ensureInfoButton(target, item.id, item.label);
        }
      } catch (_err) {}
    }
  }
  const backdrop = document.getElementById("report-info-drawer-backdrop");
  const drawer = document.getElementById("report-info-drawer");
  const drawerBody = document.getElementById("report-info-drawer-body");
  const closeBtn = document.getElementById("report-info-drawer-close");
  let activeId = "";
  let lastFocus = null;
  function sectionHtml(title, contentHtml) {
    return '<section class="report-info-section"><h4>' + esc(title) + '</h4>' + contentHtml + '</section>';
  }
  function render(item) {
    if (!item) {
      drawerBody.innerHTML = "<p>No information is configured for this field yet.</p>";
      return;
    }
    drawerBody.innerHTML =
      sectionHtml("Definition", "<p>" + esc(item.definition || "-") + "</p>") +
      sectionHtml("Formula", "<p>" + esc(item.formula || "-") + "</p>") +
      sectionHtml("Ingredients", listHtml(item.ingredients)) +
      sectionHtml("Business Validations", listHtml(item.business_validations)) +
      sectionHtml("Linked Fields (This Report)", listHtml(item.field_linkages)) +
      sectionHtml("Cross-Report Linkages", listHtml(item.cross_report_linkages)) +
      sectionHtml("Data Sources", listHtml(item.data_sources)) +
      sectionHtml("Leadership Interpretation", "<p>" + esc(item.leadership_interpretation || "-") + "</p>");
    const title = document.getElementById("report-info-drawer-title");
    if (title) title.textContent = txt(item.label) || "Field Information";
  }
  function openDrawer(id) {
    const item = byId[id];
    activeId = id;
    lastFocus = document.activeElement;
    render(item);
    backdrop.classList.add("is-open");
    drawer.classList.add("is-open");
    drawer.setAttribute("aria-hidden", "false");
    document.body.classList.add("report-info-drawer-open");
    if (closeBtn) closeBtn.focus();
  }
  function closeDrawer() {
    activeId = "";
    backdrop.classList.remove("is-open");
    drawer.classList.remove("is-open");
    drawer.setAttribute("aria-hidden", "true");
    document.body.classList.remove("report-info-drawer-open");
    if (lastFocus && lastFocus.focus) lastFocus.focus();
  }
  function triggerFromEvent(e) {
    const el = e.target.closest("[data-info-id]");
    if (!el) return;
    const id = txt(el.getAttribute("data-info-id"));
    if (!id) return;
    e.preventDefault();
    openDrawer(id);
  }
  document.addEventListener("click", triggerFromEvent);
  document.addEventListener("keydown", function (e) {
    if (e.key === "Escape" && activeId) {
      e.preventDefault();
      closeDrawer();
      return;
    }
    const inInfo = e.target && e.target.closest && e.target.closest("[data-info-id]");
    if (inInfo && (e.key === "Enter" || e.key === " ")) {
      e.preventDefault();
      openDrawer(txt(inInfo.getAttribute("data-info-id")));
    }
    if (!activeId || e.key !== "Tab") return;
    const f = drawer.querySelectorAll("button,[href],[tabindex]:not([tabindex='-1'])");
    const nodes = Array.from(f).filter((x) => !x.disabled);
    if (!nodes.length) return;
    const first = nodes[0];
    const last = nodes[nodes.length - 1];
    if (e.shiftKey && document.activeElement === first) { e.preventDefault(); last.focus(); }
    else if (!e.shiftKey && document.activeElement === last) { e.preventDefault(); first.focus(); }
  });
  closeBtn.addEventListener("click", closeDrawer);
  backdrop.addEventListener("click", closeDrawer);
  window.reportInfoCatalog = Object.values(byId);
})();
</script>

<div id="codex-refresh-wrap" aria-live="polite">
  <button id="codex-refresh-btn" type="button">
    <span class="material-symbols-outlined" aria-hidden="true">refresh</span>
    <span id="codex-refresh-btn-label">Refresh</span>
  </button>
  <div id="codex-refresh-status"></div>
</div>
<script>
(function () {
  const reportId = 'phase_rmi_gantt';
  const endpointPath = "/api/report/refresh";
  const wrap = document.getElementById("codex-refresh-wrap");
  const btn = document.getElementById("codex-refresh-btn");
  const btnLabel = document.getElementById("codex-refresh-btn-label");
  const status = document.getElementById("codex-refresh-status");
  if (!wrap || !btn || !btnLabel || !status || !reportId) return;

  function mountRefreshInNav() {
    const navTargets = [
      ".app-sidebar .sidebar-nav",
      ".unified-nav .unified-nav-list",
      ".sidebar-nav",
      ".unified-nav-list",
    ];
    for (const selector of navTargets) {
      const target = document.querySelector(selector);
      if (target) {
        target.appendChild(wrap);
        return true;
      }
    }
    return false;
  }

  if (!mountRefreshInNav()) {
    const observer = new MutationObserver(function () {
      if (mountRefreshInNav()) {
        observer.disconnect();
      }
    });
    observer.observe(document.documentElement, { childList: true, subtree: true });
    window.setTimeout(function () { observer.disconnect(); }, 5000);
  }

  function setBusy(isBusy) {
    btn.disabled = isBusy;
    btnLabel.textContent = isBusy ? "Refreshing..." : "Refresh";
  }

  function setStatus(msg) {
    status.textContent = msg || "";
  }

  function endpointCandidates() {
    if (window.location.protocol === "http:" || window.location.protocol === "https:") {
      return [endpointPath];
    }
    const savedOrigin = String(localStorage.getItem("codex-report-server-origin") || "").trim();
    const defaults = [
      "http://127.0.0.1:8000",
      "http://localhost:8000",
      "http://127.0.0.1:5000",
      "http://localhost:5000",
    ];
    const origins = [savedOrigin, ...defaults]
      .map((item) => String(item || "").trim().replace(/\/$/, ""))
      .filter(Boolean);
    return Array.from(new Set(origins)).map((origin) => origin + endpointPath);
  }

  async function postRefresh(body) {
    const endpoints = endpointCandidates();
    let lastError = "Failed to fetch";
    for (const endpoint of endpoints) {
      try {
        const response = await fetch(endpoint, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body),
        });
        if (endpoint.startsWith("http")) {
          try {
            localStorage.setItem("codex-report-server-origin", new URL(endpoint).origin);
          } catch (_err) {}
        }
        return response;
      } catch (err) {
        lastError = (err && err.message) ? err.message : String(err);
      }
    }
    throw new Error(lastError);
  }

  btn.addEventListener("click", async function () {
    setBusy(true);
    setStatus("Running scripts...");
    try {
      const response = await postRefresh({ report: reportId });
      const payload = await response.json().catch(() => ({}));
      if (!response.ok || !payload.ok) {
        const msg = payload.error || "Refresh failed.";
        setStatus(msg);
        alert(msg);
        return;
      }
      const ts = payload.completed_at || "";
      setStatus(ts ? ("Updated: " + ts) : "Updated.");
      window.location.reload();
    } catch (err) {
      const base = (err && err.message) ? err.message : String(err);
      const hint = "If report is opened from file path, use server URL like http://127.0.0.1:8000/dashboard.html";
      const msg = base ? (base + ". " + hint) : hint;
      setStatus(msg);
      alert(msg);
    } finally {
      setBusy(false);
    }
  });
})();
</script>
