(function () {
  const seeded = [];
  const byId = Object.create(null);
  function txt(v) { return String(v == null ? "" : v).trim(); }
  function asArr(v) { return Array.isArray(v) ? v : []; }
  function slug(v) { return txt(v).toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/(^-|-$)/g, "") || "info"; }
  function listHtml(values) {
    const vals = asArr(values).map((x) => txt(x)).filter(Boolean);
    if (!vals.length) return "<p>-</p>";
    return "<ul class=\"report-info-list\">" + vals.map((x) => "<li>" + esc(x) + "</li>").join("") + "</ul>";
  }
  function esc(v) {
    return txt(v).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  }
  function addCatalog(item) {
    if (!item || !txt(item.id)) return;
    byId[item.id] = Object.assign({
      id: txt(item.id), label: "Field", report: txt(window.__activeReportId || ""),
      ui_targets: [], definition: "", formula: "", ingredients: [],
      business_validations: [], field_linkages: [], cross_report_linkages: [],
      data_sources: [], leadership_interpretation: ""
    }, item);
  }
  for (const item of asArr(seeded)) addCatalog(item);
  function ensureInfoButton(host, infoId, label) {
    if (!host || !txt(infoId)) return;
    if (host.querySelector && host.querySelector('[data-info-id="' + infoId + '"]')) return;
    const btn = document.createElement("button");
    btn.type = "button";
    btn.className = "report-info-inline-btn";
    btn.textContent = "i";
    btn.setAttribute("data-info-id", infoId);
    btn.setAttribute("aria-label", (txt(label) || "Field") + " information");
    host.appendChild(btn);
  }
  function extractFromTooltips() {
    const defs = [
      [".score-info", ".score-info-tip"],
      [".kpi-info", ".kpi-info-tip"],
      [".stat-info", ".stat-info-tip"],
      [".card-i-wrap", ".card-i-tip"]
    ];
    for (const pair of defs) {
      const wrapSel = pair[0];
      const tipSel = pair[1];
      const wraps = Array.from(document.querySelectorAll(wrapSel));
      for (const wrap of wraps) {
        const tip = wrap.querySelector(tipSel);
        const raw = txt(tip ? tip.textContent : "");
        const parentLabelNode = wrap.closest(".score-label,.label,.k,.story-title,h3,h4,.card,.kpi,.stat,.summary-card");
        const label = txt(parentLabelNode ? parentLabelNode.textContent : "");
        const id = wrap.getAttribute("data-info-id") || slug((window.__activeReportId || "report") + "-" + (label || raw.slice(0, 36)));
        wrap.setAttribute("data-info-id", id);
        wrap.setAttribute("role", "button");
        wrap.setAttribute("tabindex", "0");
        if (tip) tip.style.display = "none";
        if (!byId[id]) {
          addCatalog({
            id: id,
            label: label || "Field",
            report: txt(window.__activeReportId || ""),
            ui_targets: [],
            definition: "Auto-captured from report tooltip content.",
            formula: raw.split("\n")[0] || raw,
            ingredients: [],
            business_validations: [],
            field_linkages: [],
            cross_report_linkages: [],
            data_sources: [],
            leadership_interpretation: raw
          });
        }
      }
    }
  }
  extractFromTooltips();
  for (const item of Object.values(byId)) {
    for (const selector of asArr(item.ui_targets)) {
      try {
        const nodes = Array.from(document.querySelectorAll(selector));
        for (const node of nodes) {
          const target = node.querySelector ? (node.querySelector(".label,.k,.score-label,h2,h3,h4,th") || node) : node;
          ensureInfoButton(target, item.id, item.label);
        }
      } catch (_err) {}
    }
  }
  const backdrop = document.getElementById("report-info-drawer-backdrop");
  const drawer = document.getElementById("report-info-drawer");
  const drawerBody = document.getElementById("report-info-drawer-body");
  const closeBtn = document.getElementById("report-info-drawer-close");
  let activeId = "";
  let lastFocus = null;
  function sectionHtml(title, contentHtml) {
    return '<section class="report-info-section"><h4>' + esc(title) + '</h4>' + contentHtml + '</section>';
  }
  function render(item) {
    if (!item) {
      drawerBody.innerHTML = "<p>No information is configured for this field yet.</p>";
      return;
    }
    drawerBody.innerHTML =
      sectionHtml("Definition", "<p>" + esc(item.definition || "-") + "</p>") +
      sectionHtml("Formula", "<p>" + esc(item.formula || "-") + "</p>") +
      sectionHtml("Ingredients", listHtml(item.ingredients)) +
      sectionHtml("Business Validations", listHtml(item.business_validations)) +
      sectionHtml("Linked Fields (This Report)", listHtml(item.field_linkages)) +
      sectionHtml("Cross-Report Linkages", listHtml(item.cross_report_linkages)) +
      sectionHtml("Data Sources", listHtml(item.data_sources)) +
      sectionHtml("Leadership Interpretation", "<p>" + esc(item.leadership_interpretation || "-") + "</p>");
    const title = document.getElementById("report-info-drawer-title");
    if (title) title.textContent = txt(item.label) || "Field Information";
  }
  function openDrawer(id) {
    const item = byId[id];
    activeId = id;
    lastFocus = document.activeElement;
    render(item);
    backdrop.classList.add("is-open");
    drawer.classList.add("is-open");
    drawer.setAttribute("aria-hidden", "false");
    document.body.classList.add("report-info-drawer-open");
    if (closeBtn) closeBtn.focus();
  }
  function closeDrawer() {
    activeId = "";
    backdrop.classList.remove("is-open");
    drawer.classList.remove("is-open");
    drawer.setAttribute("aria-hidden", "true");
    document.body.classList.remove("report-info-drawer-open");
    if (lastFocus && lastFocus.focus) lastFocus.focus();
  }
  function triggerFromEvent(e) {
    const el = e.target.closest("[data-info-id]");
    if (!el) return;
    const id = txt(el.getAttribute("data-info-id"));
    if (!id) return;
    e.preventDefault();
    openDrawer(id);
  }
  document.addEventListener("click", triggerFromEvent);
  document.addEventListener("keydown", function (e) {
    if (e.key === "Escape" && activeId) {
      e.preventDefault();
      closeDrawer();
      return;
    }
    const inInfo = e.target && e.target.closest && e.target.closest("[data-info-id]");
    if (inInfo && (e.key === "Enter" || e.key === " ")) {
      e.preventDefault();
      openDrawer(txt(inInfo.getAttribute("data-info-id")));
    }
    if (!activeId || e.key !== "Tab") return;
    const f = drawer.querySelectorAll("button,[href],[tabindex]:not([tabindex='-1'])");
    const nodes = Array.from(f).filter((x) => !x.disabled);
    if (!nodes.length) return;
    const first = nodes[0];
    const last = nodes[nodes.length - 1];
    if (e.shiftKey && document.activeElement === first) { e.preventDefault(); last.focus(); }
    else if (!e.shiftKey && document.activeElement === last) { e.preventDefault(); first.focus(); }
  });
  closeBtn.addEventListener("click", closeDrawer);
  backdrop.addEventListener("click", closeDrawer);
  window.reportInfoCatalog = Object.values(byId);
})();
</script>

<script>
(function () {
  const reportId = 'planned_rmis';
  const endpointPath = "/api/report/refresh";
  const isMissedEntries = reportId === "missed_entries";
  const isNestedView = reportId === "nested_view";
  const usesAsyncProgress = isMissedEntries || isNestedView;
  const wrap = document.getElementById("codex-refresh-wrap");
  const btn = document.getElementById("codex-refresh-btn");
  const cancelBtn = document.getElementById("codex-refresh-cancel-btn");
  const btnLabel = document.getElementById("codex-refresh-btn-label");
  const status = document.getElementById("codex-refresh-status");
  if (!wrap || !btn || !btnLabel || !status || !reportId) return;
  let activeRunId = "";
  let pollTimer = 0;

  if (!usesAsyncProgress && cancelBtn) {
    cancelBtn.style.display = "none";
  } else if (cancelBtn) {
    cancelBtn.style.display = "";
    cancelBtn.disabled = true;
  }

  function createProgressPanel() {
    let panel = document.getElementById("codex-refresh-progress");
    if (panel) return panel;
    panel = document.createElement("div");
    panel.id = "codex-refresh-progress";
    panel.innerHTML = `
      <div class="codex-progress-header">
        <div class="codex-progress-title">
          <strong>Live Refresh Progress</strong>
          <span id="codex-refresh-progress-subtitle">Waiting to start.</span>
        </div>
        <div id="codex-refresh-progress-pill">Idle</div>
      </div>
      <div id="codex-refresh-progress-bar" aria-hidden="true">
        <div id="codex-refresh-progress-fill"></div>
      </div>
      <div class="codex-progress-stats">
        <div class="codex-progress-stat">
          <span class="codex-progress-stat-label">Total Items</span>
          <span class="codex-progress-stat-value" id="codex-progress-total">0</span>
        </div>
        <div class="codex-progress-stat">
          <span class="codex-progress-stat-label">Processed</span>
          <span class="codex-progress-stat-value" id="codex-progress-processed">0</span>
        </div>
        <div class="codex-progress-stat">
          <span class="codex-progress-stat-label">Remaining</span>
          <span class="codex-progress-stat-value" id="codex-progress-remaining">0</span>
        </div>
        <div class="codex-progress-stat">
          <span class="codex-progress-stat-label">Progress</span>
          <span class="codex-progress-stat-value" id="codex-progress-percent">0%</span>
        </div>
      </div>
      <div class="codex-progress-current">
        <strong id="codex-progress-current-item">No active item</strong>
        <span id="codex-progress-current-detail">Progress details will appear here.</span>
      </div>
      <div id="codex-refresh-progress-items"></div>
    `;
    wrap.insertAdjacentElement("afterend", panel);
    return panel;
  }

  const progressPanel = createProgressPanel();
  const progressSubtitle = progressPanel.querySelector("#codex-refresh-progress-subtitle");
  const progressPill = progressPanel.querySelector("#codex-refresh-progress-pill");
  const progressFill = progressPanel.querySelector("#codex-refresh-progress-fill");
  const progressTotal = progressPanel.querySelector("#codex-progress-total");
  const progressProcessed = progressPanel.querySelector("#codex-progress-processed");
  const progressRemaining = progressPanel.querySelector("#codex-progress-remaining");
  const progressPercent = progressPanel.querySelector("#codex-progress-percent");
  const progressCurrentItem = progressPanel.querySelector("#codex-progress-current-item");
  const progressCurrentDetail = progressPanel.querySelector("#codex-progress-current-detail");
  const progressItems = progressPanel.querySelector("#codex-refresh-progress-items");

  function mountRefreshWidget() {
    const primaryTargets = [
      ".header-actions",
      ".report-header .header-actions",
      ".report-header-actions",
      ".page-actions",
      ".toolbar",
      ".report-toolbar",
      ".filters-and-actions",
      ".actions-bar",
    ];
    for (const selector of primaryTargets) {
      const target = document.querySelector(selector);
      if (target) {
        target.classList.add("codex-refresh-inline-host");
        wrap.classList.add("codex-refresh-inline");
        target.appendChild(wrap);
        return true;
      }
    }
    wrap.classList.remove("codex-refresh-inline");
    const navTargets = [
      ".app-sidebar .sidebar-nav",
      ".unified-nav .unified-nav-list",
      ".sidebar-nav",
      ".unified-nav-list",
    ];
    for (const selector of navTargets) {
      const target = document.querySelector(selector);
      if (target) {
        target.appendChild(wrap);
        return true;
      }
    }
    return false;
  }

  if (!mountRefreshWidget()) {
    const observer = new MutationObserver(function () {
      if (mountRefreshWidget()) {
        observer.disconnect();
      }
    });
    observer.observe(document.documentElement, { childList: true, subtree: true });
    window.setTimeout(function () { observer.disconnect(); }, 5000);
  }

  function setBusy(isBusy) {
    btn.disabled = !!isBusy;
    btnLabel.textContent = isBusy ? "Refreshing..." : "Refresh";
    if (usesAsyncProgress && cancelBtn) {
      cancelBtn.disabled = !isBusy || !activeRunId;
    }
  }

  function setStatus(msg) {
    status.textContent = msg || "";
  }

  function endpointCandidates(path) {
    const endpointSuffix = String(path || endpointPath);
    if (window.location.protocol === "http:" || window.location.protocol === "https:") {
      return [endpointSuffix];
    }
    const savedOrigin = String(localStorage.getItem("codex-report-server-origin") || "").trim();
    const defaults = [
      "http://127.0.0.1:8000",
      "http://localhost:8000",
      "http://127.0.0.1:5000",
      "http://localhost:5000",
    ];
    const origins = [savedOrigin, ...defaults]
      .map((item) => String(item || "").trim().replace(/\/$/, ""))
      .filter(Boolean);
    return Array.from(new Set(origins)).map((origin) => origin + endpointSuffix);
  }

  async function requestJson(path, options) {
    const endpoints = endpointCandidates(path);
    let lastError = "Failed to fetch";
    for (const endpoint of endpoints) {
      try {
        const response = await fetch(endpoint, options || {});
        if (endpoint.startsWith("http")) {
          try {
            localStorage.setItem("codex-report-server-origin", new URL(endpoint).origin);
          } catch (_err) {}
        }
        const payload = await response.json().catch(() => ({}));
        return { response, payload };
      } catch (err) {
        lastError = (err && err.message) ? err.message : String(err);
      }
    }
    throw new Error(lastError);
  }

  function runStatusText(run) {
    const item = run || {};
    const state = String(item.status || "").toLowerCase();
    const pct = Number(item.progress_pct || 0);
    const step = String(item.progress_step || "");
    if (state === "running") {
      return `Refresh running${step ? ` (${step})` : ""}${pct > 0 ? ` - ${pct}%` : ""}`;
    }
    if (state === "cancel_requested") {
      return "Cancel requested. Waiting for safe stop...";
    }
    if (state === "success") {
      return "Refresh completed.";
    }
    if (state === "canceled") {
      return String(item.error_message || "Refresh canceled. Previous snapshot retained.");
    }
    if (state === "failed") {
      return String(item.error_message || "Refresh failed.");
    }
    return "";
  }

  function labelForState(state) {
    const normalized = String(state || "").toLowerCase();
    if (normalized === "done") return "Done";
    if (normalized === "running") return "Running";
    if (normalized === "failed") return "Failed";
    if (normalized === "cancel_requested") return "Cancel Requested";
    if (normalized === "canceled") return "Canceled";
    return "Pending";
  }

  function showProgressPanel(visible) {
    if (!progressPanel) return;
    progressPanel.classList.toggle("codex-visible", !!visible);
  }

  function renderProgress(run) {
    if (!progressPanel) return;
    const item = run || {};
    const stats = item.stats || {};
    const total = Math.max(0, Number(stats.total_items || 0));
    const processed = Math.max(0, Number(stats.processed_items || 0));
    const remaining = Math.max(0, Number(stats.remaining_items || Math.max(0, total - processed)));
    const pct = Math.max(0, Math.min(100, Number(item.progress_pct || (total ? Math.round((processed / total) * 100) : 0))));
    const state = String(item.status || "").toLowerCase() || "pending";
    const currentItem = String(stats.current_item || item.progress_step || "Waiting to start");
    const currentDetail = String(stats.current_detail || runStatusText(item) || "Progress details will appear here.");
    const subtitle = runStatusText(item) || "Waiting to start.";
    const items = Array.isArray(stats.items) ? stats.items : [];

    showProgressPanel(usesAsyncProgress || total > 0 || processed > 0);
    progressSubtitle.textContent = subtitle;
    progressPill.textContent = labelForState(state);
    progressFill.style.width = `${pct}%`;
    progressTotal.textContent = String(total);
    progressProcessed.textContent = String(processed);
    progressRemaining.textContent = String(remaining);
    progressPercent.textContent = `${pct}%`;
    progressCurrentItem.textContent = currentItem || "Waiting to start";
    progressCurrentDetail.textContent = currentDetail;
    progressItems.innerHTML = "";
    items.forEach((entry) => {
      const row = document.createElement("div");
      const entryState = String(entry && entry.status || "pending").toLowerCase();
      row.className = "codex-progress-item";
      row.dataset.state = entryState;
      const entryLabel = String(entry && entry.label || entry && entry.key || "Step");
      const entryDetail = entryState === "running"
        ? (currentDetail || "Currently processing...")
        : (entryState === "done" ? "Completed successfully." : (entryState === "failed" ? "Stopped with an error." : "Waiting in queue."));
      row.innerHTML = `
        <div class="codex-progress-item-main">
          <span class="codex-progress-item-label"></span>
          <span class="codex-progress-item-detail"></span>
        </div>
        <span class="codex-progress-item-state"></span>
      `;
      row.querySelector(".codex-progress-item-label").textContent = entryLabel;
      row.querySelector(".codex-progress-item-detail").textContent = entryDetail;
      row.querySelector(".codex-progress-item-state").textContent = labelForState(entryState);
      progressItems.appendChild(row);
    });
  }

  function clearPolling() {
    if (pollTimer) {
      window.clearTimeout(pollTimer);
      pollTimer = 0;
    }
  }

  async function pollMissedEntriesRun(runId) {
    const runIdText = String(runId || "").trim();
    if (!runIdText) return;
    activeRunId = runIdText;
    setBusy(true);
    clearPolling();
    const tick = async function () {
      try {
        const result = await requestJson(`/api/missed-entries/refresh/${encodeURIComponent(runIdText)}`, {
          method: "GET",
          headers: { "Accept": "application/json" },
        });
        const payload = result.payload || {};
        const run = payload.run || {};
        const state = String(run.status || "").toLowerCase();
        setStatus(runStatusText(run));
        if (state === "running" || state === "cancel_requested") {
          setBusy(true);
          pollTimer = window.setTimeout(tick, 1200);
          return;
        }
        clearPolling();
        activeRunId = "";
        setBusy(false);
        if (state === "success") {
          window.location.reload();
        }
      } catch (err) {
        clearPolling();
        activeRunId = "";
        setBusy(false);
        const msg = (err && err.message) ? err.message : String(err);
        setStatus(msg || "Failed to poll refresh status.");
      }
    };
    tick();
  }

  async function pollAsyncReportRun(runId) {
    const runIdText = String(runId || "").trim();
    if (!runIdText) return;
    activeRunId = runIdText;
    setBusy(true);
    showProgressPanel(true);
    clearPolling();
    const tick = async function () {
      try {
        const result = await requestJson(`/api/report-refresh/${encodeURIComponent(runIdText)}`, {
          method: "GET",
          headers: { "Accept": "application/json" },
        });
        const payload = result.payload || {};
        const run = payload.run || {};
        const state = String(run.status || "").toLowerCase();
        setStatus(runStatusText(run));
        renderProgress(run);
        if (state === "running" || state === "cancel_requested") {
          setBusy(true);
          pollTimer = window.setTimeout(tick, 1000);
          return;
        }
        clearPolling();
        activeRunId = "";
        setBusy(false);
        if (state === "success") {
          window.setTimeout(function () {
            window.location.reload();
          }, 500);
        }
      } catch (err) {
        clearPolling();
        activeRunId = "";
        setBusy(false);
        const msg = (err && err.message) ? err.message : String(err);
        setStatus(msg || "Failed to poll refresh status.");
      }
    };
    tick();
  }

  btn.addEventListener("click", async function () {
    setBusy(true);
    setStatus(isNestedView ? "Starting live refresh..." : "Running scripts...");
    if (isNestedView) {
      renderProgress({
        status: "running",
        progress_pct: 1,
        progress_step: "queued",
        stats: {
          total_items: 3,
          processed_items: 0,
          remaining_items: 3,
          current_item: "Queueing refresh run",
          current_detail: "Preparing live progress tracker.",
          items: [
            { key: "validate_canonical", label: "Validate canonical dataset", status: "running" },
            { key: "generate_nested_view_html", label: "Generate nested view report", status: "pending" },
            { key: "sync_report_html", label: "Sync report output", status: "pending" },
          ],
        },
      });
    }
    try {
      if (isNestedView) {
        const result = await requestJson("/api/report-refresh/start", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ report: reportId }),
        });
        const response = result.response;
        const payload = result.payload || {};
        if (!response.ok || !payload.ok) {
          const msg = payload.error || "Refresh failed.";
          setStatus(msg);
          alert(msg);
          renderProgress((payload && payload.run) || {
            status: "failed",
            progress_pct: 0,
            stats: {
              total_items: 3,
              processed_items: 0,
              remaining_items: 3,
              current_item: "Refresh failed to start",
              current_detail: msg,
              items: [],
            },
          });
          return;
        }
        const run = payload.run || {};
        const runId = String(payload.run_id || run.run_id || "").trim();
        if (!runId) {
          setBusy(false);
          setStatus("Refresh started but no run ID was returned.");
          return;
        }
        renderProgress(run);
        await pollAsyncReportRun(runId);
        return;
      }

      if (!isMissedEntries) {
        const result = await requestJson(endpointPath, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ report: reportId }),
        });
        const response = result.response;
        const payload = result.payload || {};
        if (!response.ok || !payload.ok) {
          const msg = payload.error || "Refresh failed.";
          setStatus(msg);
          alert(msg);
          return;
        }
        const ts = payload.completed_at || "";
        setStatus(ts ? ("Updated: " + ts) : "Updated.");
        window.location.reload();
        return;
      }

      const result = await requestJson("/api/missed-entries/refresh", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({}),
      });
      const response = result.response;
      const payload = result.payload || {};
      if (!response.ok || !payload.ok) {
        const msg = payload.error || "Refresh failed.";
        setStatus(msg);
        alert(msg);
        return;
      }
      const run = payload.run || {};
      const runId = String(payload.run_id || run.run_id || "").trim();
      if (!runId) {
        setBusy(false);
        setStatus("Refresh started but no run ID was returned.");
        return;
      }
      setStatus(runStatusText(run) || "Refresh started.");
      await pollMissedEntriesRun(runId);
    } catch (err) {
      const base = (err && err.message) ? err.message : String(err);
      const hint = "If report is opened from file path, use server URL like http://127.0.0.1:8000/dashboard.html";
      const msg = base ? (base + ". " + hint) : hint;
      setStatus(msg);
      alert(msg);
    } finally {
      if (!usesAsyncProgress) {
        setBusy(false);
      }
    }
  });

  if (usesAsyncProgress && cancelBtn) {
    cancelBtn.addEventListener("click", async function () {
      if (!activeRunId) return;
      cancelBtn.disabled = true;
      try {
        const cancelPath = isNestedView ? "/api/report-refresh/cancel" : "/api/missed-entries/cancel";
        const body = isNestedView ? { run_id: activeRunId, report: reportId } : { run_id: activeRunId };
        const result = await requestJson(cancelPath, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body),
        });
        const response = result.response;
        const payload = result.payload || {};
        if (!response.ok || !payload.ok) {
          const msg = payload.error || "Cancel failed.";
          setStatus(msg);
          alert(msg);
          cancelBtn.disabled = false;
          return;
        }
        setStatus(String(payload.message || "Cancel requested. Waiting for safe stop..."));
      } catch (err) {
        const msg = (err && err.message) ? err.message : String(err);
        setStatus(msg || "Cancel failed.");
        cancelBtn.disabled = false;
      }
    });

    (async function attachCurrentRun() {
      try {
        const currentPath = isNestedView
          ? `/api/report-refresh/current?report=${encodeURIComponent(reportId)}`
          : "/api/missed-entries/refresh/current";
        const result = await requestJson(currentPath, {
          method: "GET",
          headers: { "Accept": "application/json" },
        });
        const payload = result.payload || {};
        const run = payload.run || null;
        if (!run) return;
        const state = String(run.status || "").toLowerCase();
        renderProgress(run);
        if (state === "running" || state === "cancel_requested") {
          setStatus(runStatusText(run));
          if (isNestedView) {
            await pollAsyncReportRun(String(run.run_id || ""));
          } else {
            await pollMissedEntriesRun(String(run.run_id || ""));
          }
        } else if (state) {
          setStatus(runStatusText(run));
        }
      } catch (_err) {
        // Best effort only.
      }
    })();
  }
})();
</script>
<!-- codex-refresh-widget-end -->
